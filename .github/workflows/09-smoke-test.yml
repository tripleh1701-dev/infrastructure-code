# =============================================================================
# 09 — Smoke Test & Seed Data: Post-deploy API validation
# =============================================================================
# Validates all backend API endpoints are reachable and functional.
# Optionally seeds sample data for testing.
#
# Flow:
#   1. (Optional) Seed dummy data into DynamoDB via seed-sample-data.ts
#   2. Obtain Cognito JWT token for API authentication
#   3. Hit every major API endpoint and verify HTTP status codes
#   4. Report results in GitHub Actions summary
#
# Run this after 04 · Deploy Backend to verify everything works end-to-end.
# =============================================================================

name: "09 · Smoke Test & Seed Data"

on:
  workflow_run:
    workflows: ['04 · Deploy Backend']
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, prod]
      seed_data:
        description: 'Seed dummy/sample data before testing'
        required: false
        default: false
        type: boolean
      seed_to_data_plane:
        description: 'Also seed data to data-plane table (account-admin-public-*)'
        required: false
        default: true
        type: boolean
      skip_auth_tests:
        description: 'Skip tests that require Cognito authentication'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT: ${{ vars.PROJECT_NAME || 'license-portal' }}

jobs:
  # ===========================================================================
  # Resolve configuration
  # ===========================================================================
  resolve:
    name: Resolve Configuration
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.config.outputs.environment }}
      should_run: ${{ steps.config.outputs.should_run }}
      seed_data: ${{ steps.config.outputs.seed_data }}
      seed_to_data_plane: ${{ steps.config.outputs.seed_to_data_plane }}
      skip_auth: ${{ steps.config.outputs.skip_auth }}

    steps:
      - name: Determine configuration
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "Upstream deploy did not succeed — skipping smoke tests"
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "should_run=true"              >> $GITHUB_OUTPUT
            echo "environment=staging"          >> $GITHUB_OUTPUT
            echo "seed_data=false"              >> $GITHUB_OUTPUT
            echo "seed_to_data_plane=false"     >> $GITHUB_OUTPUT
            echo "skip_auth=false"              >> $GITHUB_OUTPUT
          else
            echo "should_run=true"                                                >> $GITHUB_OUTPUT
            echo "environment=${{ inputs.environment }}"                          >> $GITHUB_OUTPUT
            echo "seed_data=${{ inputs.seed_data }}"                              >> $GITHUB_OUTPUT
            echo "seed_to_data_plane=${{ inputs.seed_to_data_plane }}"            >> $GITHUB_OUTPUT
            echo "skip_auth=${{ inputs.skip_auth_tests }}"                        >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Step 1: Verify SSM routing parameters
  # ===========================================================================
  verify-ssm:
    name: "Verify SSM Routing (${{ needs.resolve.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.should_run == 'true'
    environment: ${{ needs.resolve.outputs.environment }}

    outputs:
      ssm_ok: ${{ steps.check.outputs.ssm_ok }}
      api_url: ${{ steps.check.outputs.api_url }}

    steps:
      - name: Configure AWS Credentials (Platform Admin)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check SSM parameters and DynamoDB tables
        id: check
        env:
          ENV: ${{ needs.resolve.outputs.environment }}
          ACCOUNT_ID: a0000000-0000-0000-0000-000000000001
        run: |
          set -euo pipefail
          ERRORS=0

          echo "## SSM & DynamoDB Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          # Check control-plane table exists
          CP_TABLE="${PROJECT}-${ENV}-control-plane"
          if aws dynamodb describe-table --table-name "$CP_TABLE" > /dev/null 2>&1; then
            echo "| Control-plane table | ✅ | \`$CP_TABLE\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Control-plane table | ❌ | \`$CP_TABLE\` not found |" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))
          fi

          # Check data-plane (public) table exists
          DP_TABLE="account-admin-public-${ENV}"
          if aws dynamodb describe-table --table-name "$DP_TABLE" > /dev/null 2>&1; then
            echo "| Data-plane table | ✅ | \`$DP_TABLE\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Data-plane table | ❌ | \`$DP_TABLE\` not found — **this is likely the root cause of pipeline errors** |" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))

            echo "::warning::Data-plane table '$DP_TABLE' does not exist. Creating it now..."
            aws dynamodb create-table \
              --table-name "$DP_TABLE" \
              --attribute-definitions \
                AttributeName=PK,AttributeType=S \
                AttributeName=SK,AttributeType=S \
                AttributeName=GSI1PK,AttributeType=S \
                AttributeName=GSI1SK,AttributeType=S \
                AttributeName=GSI2PK,AttributeType=S \
                AttributeName=GSI2SK,AttributeType=S \
                AttributeName=GSI3PK,AttributeType=S \
                AttributeName=GSI3SK,AttributeType=S \
              --key-schema \
                AttributeName=PK,KeyType=HASH \
                AttributeName=SK,KeyType=RANGE \
              --global-secondary-indexes \
                '[
                  {"IndexName":"GSI1","KeySchema":[{"AttributeName":"GSI1PK","KeyType":"HASH"},{"AttributeName":"GSI1SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},
                  {"IndexName":"GSI2","KeySchema":[{"AttributeName":"GSI2PK","KeyType":"HASH"},{"AttributeName":"GSI2SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},
                  {"IndexName":"GSI3","KeySchema":[{"AttributeName":"GSI3PK","KeyType":"HASH"},{"AttributeName":"GSI3SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}
                ]' \
              --billing-mode PAY_PER_REQUEST \
              --tags Key=Project,Value="${PROJECT}" Key=Environment,Value="${ENV}" \
              2>/dev/null && {
                aws dynamodb wait table-exists --table-name "$DP_TABLE"
                echo "| Data-plane table (auto-created) | ✅ | \`$DP_TABLE\` created |" >> $GITHUB_STEP_SUMMARY
                ERRORS=$((ERRORS - 1))
              } || echo "| Data-plane table (auto-create) | ❌ | Failed to create |" >> $GITHUB_STEP_SUMMARY
          fi

          # Check SSM routing parameters for default account
          SSM_TABLE_PARAM="/accounts/${ACCOUNT_ID}/dynamodb/table-name"
          SSM_TABLE_VAL=$(aws ssm get-parameter --name "$SSM_TABLE_PARAM" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          if [ -n "$SSM_TABLE_VAL" ]; then
            echo "| SSM table-name param | ✅ | \`$SSM_TABLE_PARAM\` → \`$SSM_TABLE_VAL\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SSM table-name param | ❌ | \`$SSM_TABLE_PARAM\` not found — creating... |" >> $GITHUB_STEP_SUMMARY
            aws ssm put-parameter \
              --name "$SSM_TABLE_PARAM" \
              --type String \
              --value "$DP_TABLE" \
              --overwrite 2>/dev/null && \
              echo "| SSM table-name param (auto-created) | ✅ | Set to \`$DP_TABLE\` |" >> $GITHUB_STEP_SUMMARY || \
              { echo "| SSM table-name param (auto-create) | ❌ | Failed |" >> $GITHUB_STEP_SUMMARY; ERRORS=$((ERRORS + 1)); }
          fi

          SSM_CLOUD_PARAM="/accounts/${ACCOUNT_ID}/cloud-type"
          SSM_CLOUD_VAL=$(aws ssm get-parameter --name "$SSM_CLOUD_PARAM" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          if [ -n "$SSM_CLOUD_VAL" ]; then
            echo "| SSM cloud-type param | ✅ | \`$SSM_CLOUD_PARAM\` → \`$SSM_CLOUD_VAL\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SSM cloud-type param | ❌ | \`$SSM_CLOUD_PARAM\` not found — creating... |" >> $GITHUB_STEP_SUMMARY
            aws ssm put-parameter \
              --name "$SSM_CLOUD_PARAM" \
              --type String \
              --value "public" \
              --overwrite 2>/dev/null && \
              echo "| SSM cloud-type param (auto-created) | ✅ | Set to \`public\` |" >> $GITHUB_STEP_SUMMARY || \
              { echo "| SSM cloud-type param (auto-create) | ❌ | Failed |" >> $GITHUB_STEP_SUMMARY; ERRORS=$((ERRORS + 1)); }
          fi

          # Get API URL
          API_URL=$(aws ssm get-parameter \
            --name "/${PROJECT}/${ENV}/api/base-url" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

          if [ "$ERRORS" -eq 0 ]; then
            echo "ssm_ok=true" >> $GITHUB_OUTPUT
          else
            echo "ssm_ok=false" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Step 2: Seed sample data (optional)
  # ===========================================================================
  seed-data:
    name: "Seed Sample Data (${{ needs.resolve.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [resolve, verify-ssm]
    if: >
      needs.resolve.outputs.should_run == 'true' &&
      needs.resolve.outputs.seed_data == 'true' &&
      needs.verify-ssm.outputs.ssm_ok == 'true'
    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          npm install --package-lock-only 2>/dev/null || true
          npm install

      - name: Configure AWS Credentials (Platform Admin)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Seed data to control-plane table
        working-directory: backend
        env:
          CONTROL_PLANE_TABLE_NAME: ${{ env.PROJECT }}-${{ needs.resolve.outputs.environment }}-control-plane
          DYNAMODB_TABLE_NAME: ${{ env.PROJECT }}-${{ needs.resolve.outputs.environment }}-control-plane
          NODE_ENV: ${{ needs.resolve.outputs.environment }}
        run: |
          echo "Seeding sample data to control-plane table..."
          npx ts-node -P tsconfig.scripts.json scripts/seed-sample-data.ts || {
            echo "::warning::Seed script exited with non-zero code"
          }
          echo "### Seed Data" >> $GITHUB_STEP_SUMMARY
          echo "Sample data seeded to \`${CONTROL_PLANE_TABLE_NAME}\`" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Step 3: API Smoke Tests
  # ===========================================================================
  smoke-test:
    name: "API Smoke Tests (${{ needs.resolve.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [resolve, verify-ssm, seed-data]
    if: >
      always() &&
      needs.resolve.outputs.should_run == 'true' &&
      needs.verify-ssm.result == 'success' &&
      (needs.seed-data.result == 'success' || needs.seed-data.result == 'skipped')
    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - name: Configure AWS Credentials (Platform Admin)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve API Gateway URL
        id: api
        run: |
          API_URL="${{ needs.verify-ssm.outputs.api_url }}"
          if [ -z "$API_URL" ]; then
            # Fallback: look up from API Gateway
            API_ID=$(aws apigateway get-rest-apis \
              --query "items[?name=='${PROJECT}-${{ needs.resolve.outputs.environment }}'].id" \
              --output text 2>/dev/null || echo "")
            if [ -n "$API_ID" ]; then
              API_URL="https://${API_ID}.execute-api.${AWS_REGION}.amazonaws.com/${{ needs.resolve.outputs.environment }}"
            fi
          fi

          if [ -z "$API_URL" ]; then
            echo "::error::Could not resolve API Gateway URL"
            exit 1
          fi

          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "API URL: $API_URL"

      - name: Get Cognito token
        id: auth
        if: needs.resolve.outputs.skip_auth != 'true'
        env:
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.BOOTSTRAP_ADMIN_EMAIL || 'admin@adminplatform.com' }}
        run: |
          set -euo pipefail

          if [ -z "$COGNITO_USER_POOL_ID" ] || [ -z "$COGNITO_CLIENT_ID" ] || [ -z "$ADMIN_PASSWORD" ]; then
            echo "::warning::Cognito credentials not configured — auth tests will be skipped"
            echo "has_token=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Authenticate via Cognito
          AUTH_RESULT=$(aws cognito-idp admin-initiate-auth \
            --user-pool-id "$COGNITO_USER_POOL_ID" \
            --client-id "$COGNITO_CLIENT_ID" \
            --auth-flow ADMIN_NO_SRP_AUTH \
            --auth-parameters USERNAME="$ADMIN_EMAIL",PASSWORD="$ADMIN_PASSWORD" \
            --query 'AuthenticationResult.IdToken' \
            --output text 2>/dev/null || echo "")

          if [ -n "$AUTH_RESULT" ] && [ "$AUTH_RESULT" != "None" ]; then
            echo "::add-mask::$AUTH_RESULT"
            echo "token=$AUTH_RESULT" >> $GITHUB_OUTPUT
            echo "has_token=true" >> $GITHUB_OUTPUT
            echo "✅ Cognito authentication successful"
          else
            echo "::warning::Cognito authentication failed — auth tests will be skipped"
            echo "has_token=false" >> $GITHUB_OUTPUT
          fi

      - name: Run API smoke tests
        id: tests
        env:
          API_URL: ${{ steps.api.outputs.api_url }}
          TOKEN: ${{ steps.auth.outputs.token }}
          HAS_TOKEN: ${{ steps.auth.outputs.has_token }}
        run: |
          set -euo pipefail

          TOTAL=0
          PASSED=0
          FAILED=0
          SKIPPED=0
          RESULTS=""

          # Helper function for API calls
          test_endpoint() {
            local METHOD="$1"
            local PATH="$2"
            local EXPECTED="$3"
            local DESCRIPTION="$4"
            local NEEDS_AUTH="${5:-true}"
            local BODY="${6:-}"

            TOTAL=$((TOTAL + 1))

            if [ "$NEEDS_AUTH" == "true" ] && [ "$HAS_TOKEN" != "true" ]; then
              SKIPPED=$((SKIPPED + 1))
              RESULTS="${RESULTS}\n| ${DESCRIPTION} | ⏭️ Skipped | No auth token | \`${METHOD} ${PATH}\` |"
              return
            fi

            CURL_ARGS=(-s -o /tmp/response.json -w "%{http_code}" --max-time 30)

            if [ "$NEEDS_AUTH" == "true" ]; then
              CURL_ARGS+=(-H "Authorization: Bearer ${TOKEN}")
            fi

            CURL_ARGS+=(-H "Content-Type: application/json")

            if [ -n "$BODY" ]; then
              CURL_ARGS+=(-d "$BODY")
            fi

            if [ "$METHOD" == "POST" ]; then
              CURL_ARGS+=(-X POST)
            elif [ "$METHOD" == "PUT" ]; then
              CURL_ARGS+=(-X PUT)
            elif [ "$METHOD" == "DELETE" ]; then
              CURL_ARGS+=(-X DELETE)
            fi

            HTTP_CODE=$(curl "${CURL_ARGS[@]}" "${API_URL}/api${PATH}" 2>/dev/null || echo "000")
            RESPONSE_BODY=$(cat /tmp/response.json 2>/dev/null || echo "{}")

            # Check if status matches expected (support comma-separated list)
            MATCH=false
            for EXP in $(echo "$EXPECTED" | tr ',' ' '); do
              if [ "$HTTP_CODE" == "$EXP" ]; then
                MATCH=true
                break
              fi
            done

            if [ "$MATCH" == "true" ]; then
              PASSED=$((PASSED + 1))
              RESULTS="${RESULTS}\n| ${DESCRIPTION} | ✅ ${HTTP_CODE} | OK | \`${METHOD} ${PATH}\` |"
            else
              FAILED=$((FAILED + 1))
              # Truncate response for summary
              ERR_MSG=$(echo "$RESPONSE_BODY" | jq -r '.error.message // .message // "Unknown error"' 2>/dev/null | head -c 80)
              RESULTS="${RESULTS}\n| ${DESCRIPTION} | ❌ ${HTTP_CODE} | ${ERR_MSG} | \`${METHOD} ${PATH}\` |"
            fi
          }

          echo "🧪 Running API smoke tests against ${API_URL}..."
          echo ""

          # ── Health check (no auth) ──────────────────────────────
          test_endpoint "GET" "/health" "200" "Health Check" "false"

          # ── Accounts ────────────────────────────────────────────
          test_endpoint "GET" "/accounts" "200" "List Accounts" "true"
          test_endpoint "GET" "/accounts/a0000000-0000-0000-0000-000000000001" "200" "Get Account" "true"

          # ── Enterprises ─────────────────────────────────────────
          test_endpoint "GET" "/enterprises" "200" "List Enterprises" "true"

          # ── Products ────────────────────────────────────────────
          test_endpoint "GET" "/services" "200" "List Services" "true"

          # ── Users ───────────────────────────────────────────────
          test_endpoint "GET" "/users?accountId=a0000000-0000-0000-0000-000000000001" "200" "List Users" "true"

          # ── Groups ──────────────────────────────────────────────
          test_endpoint "GET" "/groups?accountId=a0000000-0000-0000-0000-000000000001" "200" "List Groups" "true"

          # ── Roles ───────────────────────────────────────────────
          test_endpoint "GET" "/roles?accountId=a0000000-0000-0000-0000-000000000001" "200" "List Roles" "true"

          # ── Licenses ────────────────────────────────────────────
          test_endpoint "GET" "/licenses?accountId=a0000000-0000-0000-0000-000000000001" "200" "List Licenses" "true"

          # ── Pipelines (data-plane routed) ───────────────────────
          test_endpoint "GET" "/pipelines?accountId=a0000000-0000-0000-0000-000000000001" "200" "List Pipelines" "true"
          test_endpoint "GET" "/pipelines/stats?accountId=a0000000-0000-0000-0000-000000000001" "200" "Pipeline Stats" "true"

          # ── Builds (data-plane routed) ──────────────────────────
          test_endpoint "GET" "/builds?accountId=a0000000-0000-0000-0000-000000000001" "200" "List Builds" "true"

          # ── Connectors (data-plane routed) ──────────────────────
          test_endpoint "GET" "/environments?accountId=a0000000-0000-0000-0000-000000000001" "200" "List Environments" "true"

          # ── Credentials ─────────────────────────────────────────
          test_endpoint "GET" "/workstreams?accountId=a0000000-0000-0000-0000-000000000001" "200" "List Workstreams" "true"

          # ── Inbox ───────────────────────────────────────────────
          test_endpoint "GET" "/inbox?accountId=a0000000-0000-0000-0000-000000000001" "200" "List Inbox" "true"

          # ── Pipeline Create (write test) ────────────────────────
          test_endpoint "POST" "/pipelines" "201,200" "Create Pipeline" "true" \
            '{"name":"smoke-test-pipeline","status":"draft","deploymentType":"Integration","nodes":[],"edges":[],"accountId":"a0000000-0000-0000-0000-000000000001","enterpriseId":"00000000-0000-0000-0000-000000000001"}'

          # ── Enterprise Products ─────────────────────────────────
          test_endpoint "GET" "/enterprise-products" "200" "List Enterprise Products" "true"

          # ── Notification History ────────────────────────────────
          test_endpoint "GET" "/notification-history?accountId=a0000000-0000-0000-0000-000000000001" "200" "Notification History" "true"

          # ── Summary ─────────────────────────────────────────────
          echo ""
          echo "================================================"
          echo "  Results: ${PASSED}/${TOTAL} passed, ${FAILED} failed, ${SKIPPED} skipped"
          echo "================================================"

          echo "## 🧪 API Smoke Test Results — ${{ needs.resolve.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status | Details | Path |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo -e "$RESULTS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | ${PASSED} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | ${FAILED} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭️ Skipped | ${SKIPPED} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **${TOTAL}** |" >> $GITHUB_STEP_SUMMARY

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} smoke tests failed"
            exit 1
          fi

  # ===========================================================================
  # Step 4: Cleanup seeded data (runs only when seed_data was true)
  # ===========================================================================
  cleanup:
    name: "Cleanup Seeded Data (${{ needs.resolve.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [resolve, verify-ssm, seed-data, smoke-test]
    if: >
      always() &&
      needs.resolve.outputs.seed_data == 'true' &&
      needs.seed-data.result == 'success' &&
      needs.smoke-test.result != 'cancelled'
    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - name: Configure AWS Credentials (Platform Admin)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Remove smoke-test pipeline from data-plane
        env:
          ENV: ${{ needs.resolve.outputs.environment }}
          ACCOUNT_ID: a0000000-0000-0000-0000-000000000001
          ENTERPRISE_ID: "00000000-0000-0000-0000-000000000001"
        run: |
          set -euo pipefail
          CLEANED=0
          ERRORS=0

          DP_TABLE="account-admin-public-${ENV}"
          CP_TABLE="${PROJECT}-${ENV}-control-plane"

          echo "## 🧹 Cleanup Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Table | Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|------|--------|" >> $GITHUB_STEP_SUMMARY

          # ── Delete smoke-test pipeline(s) from data-plane table ──
          if aws dynamodb describe-table --table-name "$DP_TABLE" > /dev/null 2>&1; then
            # Scan for smoke-test pipelines by name prefix
            ITEMS=$(aws dynamodb scan \
              --table-name "$DP_TABLE" \
              --filter-expression "begins_with(SK, :sk)" \
              --expression-attribute-values '{":sk":{"S":"PIPELINE#"}}' \
              --projection-expression "PK, SK" \
              --output json 2>/dev/null | jq -c '.Items[]' 2>/dev/null || echo "")

            for ITEM in $ITEMS; do
              PK=$(echo "$ITEM" | jq -r '.PK.S')
              SK=$(echo "$ITEM" | jq -r '.SK.S')

              # Fetch name to check if it's a smoke-test item
              FULL=$(aws dynamodb get-item \
                --table-name "$DP_TABLE" \
                --key "{\"PK\":{\"S\":\"$PK\"},\"SK\":{\"S\":\"$SK\"}}" \
                --output json 2>/dev/null || echo "{}")
              NAME=$(echo "$FULL" | jq -r '.Item.name.S // .Item.Name.S // ""' 2>/dev/null)

              if echo "$NAME" | grep -qi "smoke-test"; then
                aws dynamodb delete-item \
                  --table-name "$DP_TABLE" \
                  --key "{\"PK\":{\"S\":\"$PK\"},\"SK\":{\"S\":\"$SK\"}}" 2>/dev/null && {
                    CLEANED=$((CLEANED + 1))
                    echo "| \`$DP_TABLE\` | \`$SK\` ($NAME) | ✅ Deleted |" >> $GITHUB_STEP_SUMMARY
                  } || {
                    ERRORS=$((ERRORS + 1))
                    echo "| \`$DP_TABLE\` | \`$SK\` | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
                  }
              fi
            done
          fi

          # ── Delete smoke-test items from control-plane table ──
          if aws dynamodb describe-table --table-name "$CP_TABLE" > /dev/null 2>&1; then
            ITEMS=$(aws dynamodb scan \
              --table-name "$CP_TABLE" \
              --filter-expression "begins_with(SK, :sk)" \
              --expression-attribute-values '{":sk":{"S":"PIPELINE#"}}' \
              --projection-expression "PK, SK" \
              --output json 2>/dev/null | jq -c '.Items[]' 2>/dev/null || echo "")

            for ITEM in $ITEMS; do
              PK=$(echo "$ITEM" | jq -r '.PK.S')
              SK=$(echo "$ITEM" | jq -r '.SK.S')

              FULL=$(aws dynamodb get-item \
                --table-name "$CP_TABLE" \
                --key "{\"PK\":{\"S\":\"$PK\"},\"SK\":{\"S\":\"$SK\"}}" \
                --output json 2>/dev/null || echo "{}")
              NAME=$(echo "$FULL" | jq -r '.Item.name.S // .Item.Name.S // ""' 2>/dev/null)

              if echo "$NAME" | grep -qi "smoke-test"; then
                aws dynamodb delete-item \
                  --table-name "$CP_TABLE" \
                  --key "{\"PK\":{\"S\":\"$PK\"},\"SK\":{\"S\":\"$SK\"}}" 2>/dev/null && {
                    CLEANED=$((CLEANED + 1))
                    echo "| \`$CP_TABLE\` | \`$SK\` ($NAME) | ✅ Deleted |" >> $GITHUB_STEP_SUMMARY
                  } || {
                    ERRORS=$((ERRORS + 1))
                    echo "| \`$CP_TABLE\` | \`$SK\` | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
                  }
              fi
            done
          fi

          # ── Delete seeded sample data (accounts, enterprises, etc.) ──
          # Only delete items tagged with smoke-test marker
          for TABLE in "$CP_TABLE" "$DP_TABLE"; do
            if aws dynamodb describe-table --table-name "$TABLE" > /dev/null 2>&1; then
              SEED_ITEMS=$(aws dynamodb scan \
                --table-name "$TABLE" \
                --filter-expression "attribute_exists(#st)" \
                --expression-attribute-names '{"#st":"smoke_test_seed"}' \
                --projection-expression "PK, SK" \
                --output json 2>/dev/null | jq -c '.Items[]' 2>/dev/null || echo "")

              for ITEM in $SEED_ITEMS; do
                PK=$(echo "$ITEM" | jq -r '.PK.S')
                SK=$(echo "$ITEM" | jq -r '.SK.S')
                aws dynamodb delete-item \
                  --table-name "$TABLE" \
                  --key "{\"PK\":{\"S\":\"$PK\"},\"SK\":{\"S\":\"$SK\"}}" 2>/dev/null && {
                    CLEANED=$((CLEANED + 1))
                    echo "| \`$TABLE\` | \`$PK / $SK\` (seed) | ✅ Deleted |" >> $GITHUB_STEP_SUMMARY
                  } || {
                    ERRORS=$((ERRORS + 1))
                    echo "| \`$TABLE\` | \`$PK / $SK\` (seed) | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
                  }
              done
            fi
          done

          if [ "$CLEANED" -eq 0 ] && [ "$ERRORS" -eq 0 ]; then
            echo "| — | No smoke-test data found | ℹ️ Nothing to clean |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cleaned:** ${CLEANED} items | **Errors:** ${ERRORS}" >> $GITHUB_STEP_SUMMARY

          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::${ERRORS} items failed to clean up"
          fi

  # ===========================================================================
  # Final Summary
  # ===========================================================================
  summary:
    name: "Smoke Test Summary"
    runs-on: ubuntu-latest
    needs: [resolve, verify-ssm, seed-data, smoke-test, cleanup]
    if: always() && needs.resolve.outputs.should_run == 'true'

    steps:
      - name: Final summary
        run: |
          echo "## 📋 Smoke Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SSM Verification | ${{ needs.verify-ssm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Seed Data | ${{ needs.seed-data.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Smoke Tests | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cleanup | ${{ needs.cleanup.result }} |" >> $GITHUB_STEP_SUMMARY
