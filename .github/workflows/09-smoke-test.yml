# =============================================================================
# 09 — Comprehensive Smoke Test & Regression Suite
# =============================================================================
# Full-stack regression: SSM, DynamoDB, all API endpoints, RBAC, CRUD ops.
# Validates both control-plane and data-plane tables have correct entries.
#
# Flow:
#   1. Verify SSM parameters (routing + project-level)
#   2. Verify DynamoDB tables exist and have GSIs
#   3. (Optional) Seed comprehensive dummy data
#   4. Authenticate via Cognito
#   5. Test ALL API endpoints (GET, POST, PUT, DELETE)
#   6. Verify DynamoDB entries in both tables
#   7. Cleanup seeded data
#   8. Report full summary
#
# Run after 04 · Deploy Backend for end-to-end validation.
# =============================================================================

name: "09 · Smoke Test & Regression"

on:
  workflow_run:
    workflows: ['04 · Deploy Backend']
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [dev, staging, prod]
      seed_data:
        description: 'Seed comprehensive dummy data before testing'
        required: false
        default: false
        type: boolean
      seed_to_data_plane:
        description: 'Also seed data to data-plane table (account-admin-public-*)'
        required: false
        default: true
        type: boolean
      skip_auth_tests:
        description: 'Skip tests that require Cognito authentication'
        required: false
        default: false
        type: boolean
      cleanup_after:
        description: 'Cleanup seeded data after tests'
        required: false
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT: ${{ vars.PROJECT_NAME || 'license-portal' }}

jobs:
  # ===========================================================================
  # Resolve configuration
  # ===========================================================================
  resolve:
    name: Resolve Configuration
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.config.outputs.environment }}
      should_run: ${{ steps.config.outputs.should_run }}
      seed_data: ${{ steps.config.outputs.seed_data }}
      seed_to_data_plane: ${{ steps.config.outputs.seed_to_data_plane }}
      skip_auth: ${{ steps.config.outputs.skip_auth }}
      cleanup_after: ${{ steps.config.outputs.cleanup_after }}

    steps:
      - name: Determine configuration
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "Upstream deploy did not succeed — skipping smoke tests"
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "should_run=true"              >> $GITHUB_OUTPUT
            echo "environment=staging"          >> $GITHUB_OUTPUT
            echo "seed_data=false"              >> $GITHUB_OUTPUT
            echo "seed_to_data_plane=false"     >> $GITHUB_OUTPUT
            echo "skip_auth=false"              >> $GITHUB_OUTPUT
            echo "cleanup_after=true"           >> $GITHUB_OUTPUT
          else
            echo "should_run=true"                                                >> $GITHUB_OUTPUT
            echo "environment=${{ inputs.environment }}"                          >> $GITHUB_OUTPUT
            echo "seed_data=${{ inputs.seed_data }}"                              >> $GITHUB_OUTPUT
            echo "seed_to_data_plane=${{ inputs.seed_to_data_plane }}"            >> $GITHUB_OUTPUT
            echo "skip_auth=${{ inputs.skip_auth_tests }}"                        >> $GITHUB_OUTPUT
            echo "cleanup_after=${{ inputs.cleanup_after }}"                      >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Step 1: Verify SSM routing + project parameters
  # ===========================================================================
  verify-ssm:
    name: "Verify SSM & DynamoDB (${{ needs.resolve.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.should_run == 'true'
    environment: ${{ needs.resolve.outputs.environment }}

    outputs:
      ssm_ok: ${{ steps.check.outputs.ssm_ok }}
      api_url: ${{ steps.check.outputs.api_url }}

    steps:
      - name: Checkout (for composite action)
        uses: actions/checkout@v5

      - name: "🔍 OIDC Preflight"
        uses: ./.github/actions/oidc-preflight
        id: oidc_preflight

      - name: Configure AWS Credentials (Platform Admin via OIDC)
        id: aws_oidc
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}-${{ github.job }}
          retry-max-attempts: 12
        continue-on-error: true

      - name: Validate fallback static key availability
        if: steps.aws_oidc.outcome != 'success'
        env:
          FALLBACK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          FALLBACK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
        run: |
          if [ -z "${FALLBACK_AWS_ACCESS_KEY_ID}" ] || [ -z "${FALLBACK_AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::OIDC auth failed and fallback static keys are not configured."
            exit 1
          fi

      - name: Configure AWS Credentials (Platform Admin via static fallback)
        if: steps.aws_oidc.outcome != 'success'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Comprehensive SSM & DynamoDB verification
        id: check
        env:
          ENV: ${{ needs.resolve.outputs.environment }}
          ACCOUNT_ID: a0000000-0000-0000-0000-000000000001
          DATA_PLANE_ROLE_ARN: ${{ secrets.DATA_PLANE_ROLE_ARN }}
          DATA_PLANE_TABLE_NAME: ${{ secrets.DATA_PLANE_TABLE_NAME }}
          CROSS_ACCOUNT_EXTERNAL_ID: ${{ secrets.CROSS_ACCOUNT_EXTERNAL_ID }}
        run: |
          set -euo pipefail
          ERRORS=0
          WARNINGS=0

          echo "## SSM & DynamoDB Comprehensive Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── DynamoDB Tables ─────────────────────────────────────
          echo "### DynamoDB Tables" >> $GITHUB_STEP_SUMMARY
          echo "| Table | Status | GSIs | Item Count |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|------|------------|" >> $GITHUB_STEP_SUMMARY

          # Check a table using the currently configured AWS credentials
          check_table() {
            local TABLE_NAME="$1"
            local LABEL="$2"
            local AUTO_CREATE="$3"

            if TABLE_INFO=$(aws dynamodb describe-table --table-name "$TABLE_NAME" --output json 2>/dev/null); then
              GSI_COUNT=$(echo "$TABLE_INFO" | jq '.Table.GlobalSecondaryIndexes | length // 0')
              ITEM_COUNT=$(echo "$TABLE_INFO" | jq '.Table.ItemCount // 0')
              echo "| $LABEL (\`$TABLE_NAME\`) | ✅ Exists | ${GSI_COUNT} GSIs | ${ITEM_COUNT} items |" >> $GITHUB_STEP_SUMMARY

              # Verify all 3 GSIs exist
              if [ "$GSI_COUNT" -lt 3 ]; then
                echo "::warning::$TABLE_NAME has only $GSI_COUNT GSIs (expected 3)"
                WARNINGS=$((WARNINGS + 1))
              fi
            elif [ "$AUTO_CREATE" == "true" ]; then
              echo "| $LABEL (\`$TABLE_NAME\`) | ❌ Missing | — | — |" >> $GITHUB_STEP_SUMMARY
              echo "::warning::$TABLE_NAME not found — creating..."

              aws dynamodb create-table \
                --table-name "$TABLE_NAME" \
                --attribute-definitions \
                  AttributeName=PK,AttributeType=S \
                  AttributeName=SK,AttributeType=S \
                  AttributeName=GSI1PK,AttributeType=S \
                  AttributeName=GSI1SK,AttributeType=S \
                  AttributeName=GSI2PK,AttributeType=S \
                  AttributeName=GSI2SK,AttributeType=S \
                  AttributeName=GSI3PK,AttributeType=S \
                  AttributeName=GSI3SK,AttributeType=S \
                --key-schema \
                  AttributeName=PK,KeyType=HASH \
                  AttributeName=SK,KeyType=RANGE \
                --global-secondary-indexes \
                  '[
                    {"IndexName":"GSI1","KeySchema":[{"AttributeName":"GSI1PK","KeyType":"HASH"},{"AttributeName":"GSI1SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},
                    {"IndexName":"GSI2","KeySchema":[{"AttributeName":"GSI2PK","KeyType":"HASH"},{"AttributeName":"GSI2SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},
                    {"IndexName":"GSI3","KeySchema":[{"AttributeName":"GSI3PK","KeyType":"HASH"},{"AttributeName":"GSI3SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}
                  ]' \
                --billing-mode PAY_PER_REQUEST \
                --tags Key=Project,Value="${PROJECT}" Key=Environment,Value="${ENV}" \
                2>/dev/null && {
                  aws dynamodb wait table-exists --table-name "$TABLE_NAME"
                  echo "| $LABEL (auto-created) | ✅ Created | 3 GSIs | 0 items |" >> $GITHUB_STEP_SUMMARY
                } || {
                  echo "| $LABEL (auto-create) | ❌ Failed | — | — |" >> $GITHUB_STEP_SUMMARY
                  ERRORS=$((ERRORS + 1))
                }
            else
              echo "| $LABEL (\`$TABLE_NAME\`) | ❌ Missing | — | — |" >> $GITHUB_STEP_SUMMARY
              ERRORS=$((ERRORS + 1))
            fi
          }

          CP_TABLE="${PROJECT}-${ENV}-control-plane"
          DP_TABLE="${DATA_PLANE_TABLE_NAME:-account-admin-public-${ENV}}"

          # Control-plane table lives in the Platform Admin account (current creds)
          check_table "$CP_TABLE" "Control-Plane" "false"

          # ── Data-plane table lives in the CUSTOMER account ──────
          # We must assume the cross-account role before checking/creating it
          DP_CHECK_OK=false
          if [ -n "${DATA_PLANE_ROLE_ARN:-}" ]; then
            echo ""
            echo "Assuming cross-account role for data-plane table check..."

            ASSUME_ARGS="--role-arn ${DATA_PLANE_ROLE_ARN} --role-session-name smoke-dp-check-${GITHUB_RUN_ID} --duration-seconds 900"
            if [ -n "${CROSS_ACCOUNT_EXTERNAL_ID:-}" ]; then
              ASSUME_ARGS="${ASSUME_ARGS} --external-id ${CROSS_ACCOUNT_EXTERNAL_ID}"
            fi

            if ASSUMED=$(aws sts assume-role $ASSUME_ARGS --output json 2>/dev/null); then
              # Extract and export temporary credentials
              export AWS_ACCESS_KEY_ID=$(echo "$ASSUMED" | jq -r '.Credentials.AccessKeyId')
              export AWS_SECRET_ACCESS_KEY=$(echo "$ASSUMED" | jq -r '.Credentials.SecretAccessKey')
              export AWS_SESSION_TOKEN=$(echo "$ASSUMED" | jq -r '.Credentials.SessionToken')

              CUSTOMER_ACCOUNT=$(aws sts get-caller-identity --query Account --output text 2>/dev/null || echo "unknown")
              echo "✅ Assumed role in customer account: ${CUSTOMER_ACCOUNT}"

              # Now check/create the data-plane table using customer account creds
              check_table "$DP_TABLE" "Data-Plane (Public, customer acct ${CUSTOMER_ACCOUNT})" "true"
              DP_CHECK_OK=true

              # Restore Platform Admin credentials (unset overrides so OIDC creds take effect)
              unset AWS_ACCESS_KEY_ID
              unset AWS_SECRET_ACCESS_KEY
              unset AWS_SESSION_TOKEN
            else
              echo "::warning::Failed to assume DATA_PLANE_ROLE_ARN — cannot verify data-plane table in customer account"
              echo "| Data-Plane (Public) (\`$DP_TABLE\`) | ⚠️ Cannot verify (AssumeRole failed) | — | — |" >> $GITHUB_STEP_SUMMARY
              WARNINGS=$((WARNINGS + 1))
            fi
          else
            echo "::warning::DATA_PLANE_ROLE_ARN not set — checking data-plane table in Platform Admin account (may be incorrect)"
            echo "| Data-Plane (Public) | ⚠️ DATA_PLANE_ROLE_ARN not configured | — | — |" >> $GITHUB_STEP_SUMMARY
            WARNINGS=$((WARNINGS + 1))
          fi

          # ── SSM Parameters ──────────────────────────────────────
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SSM Parameters" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Status | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-------|" >> $GITHUB_STEP_SUMMARY

          check_ssm() {
            local PARAM_NAME="$1"
            local LABEL="$2"
            local DEFAULT_VALUE="${3:-}"

            local VAL
            VAL=$(aws ssm get-parameter --name "$PARAM_NAME" --query 'Parameter.Value' --output text 2>/dev/null || echo "")
            if [ -n "$VAL" ]; then
              # Mask sensitive values
              local DISPLAY_VAL="$VAL"
              if echo "$PARAM_NAME" | grep -qiE "arn|secret|password|key"; then
                DISPLAY_VAL="${VAL:0:20}..."
              fi
              echo "| $LABEL | ✅ | \`$DISPLAY_VAL\` |" >> $GITHUB_STEP_SUMMARY
            elif [ -n "$DEFAULT_VALUE" ]; then
              echo "| $LABEL | ⚠️ Missing — creating | \`$DEFAULT_VALUE\` |" >> $GITHUB_STEP_SUMMARY
              aws ssm put-parameter --name "$PARAM_NAME" --type String --value "$DEFAULT_VALUE" --overwrite 2>/dev/null || {
                ERRORS=$((ERRORS + 1))
                echo "| $LABEL (auto-create) | ❌ Failed | — |" >> $GITHUB_STEP_SUMMARY
              }
            else
              echo "| $LABEL | ❌ Missing | — |" >> $GITHUB_STEP_SUMMARY
              WARNINGS=$((WARNINGS + 1))
            fi
          }

          # Account-level SSM routing params
          check_ssm "/accounts/${ACCOUNT_ID}/dynamodb/table-name" "Account table-name" "$DP_TABLE"
          check_ssm "/accounts/${ACCOUNT_ID}/cloud-type" "Account cloud-type" "public"

          # Project-level SSM params
          SSM_PREFIX="/${PROJECT}/${ENV}"
          check_ssm "${SSM_PREFIX}/api/base-url" "API Base URL" ""
          check_ssm "${SSM_PREFIX}/cognito/user-pool-id" "Cognito User Pool ID" ""
          check_ssm "${SSM_PREFIX}/cognito/client-id" "Cognito Client ID" ""
          check_ssm "${SSM_PREFIX}/dynamodb/control-plane-table" "CP Table Name" "$CP_TABLE"

          # Data-plane SSM params live in CUSTOMER account for this architecture
          check_ssm_customer() {
            local PARAM_NAME="$1"
            local LABEL="$2"

            if [ -z "${DATA_PLANE_ROLE_ARN:-}" ]; then
              echo "| $LABEL | ⚠️ Cannot verify (DATA_PLANE_ROLE_ARN missing) | — |" >> $GITHUB_STEP_SUMMARY
              WARNINGS=$((WARNINGS + 1))
              return
            fi

            local ASSUME_ARGS="--role-arn ${DATA_PLANE_ROLE_ARN} --role-session-name smoke-ssm-customer-${GITHUB_RUN_ID} --duration-seconds 900"
            if [ -n "${CROSS_ACCOUNT_EXTERNAL_ID:-}" ]; then
              ASSUME_ARGS="${ASSUME_ARGS} --external-id ${CROSS_ACCOUNT_EXTERNAL_ID}"
            fi

            local ASSUMED
            if ! ASSUMED=$(aws sts assume-role $ASSUME_ARGS --output json 2>/dev/null); then
              echo "| $LABEL | ⚠️ Cannot verify (AssumeRole failed) | — |" >> $GITHUB_STEP_SUMMARY
              WARNINGS=$((WARNINGS + 1))
              return
            fi

            local TMP_AKI TMP_SAK TMP_STK
            TMP_AKI=$(echo "$ASSUMED" | jq -r '.Credentials.AccessKeyId')
            TMP_SAK=$(echo "$ASSUMED" | jq -r '.Credentials.SecretAccessKey')
            TMP_STK=$(echo "$ASSUMED" | jq -r '.Credentials.SessionToken')

            local VAL
            VAL=$(AWS_ACCESS_KEY_ID="$TMP_AKI" AWS_SECRET_ACCESS_KEY="$TMP_SAK" AWS_SESSION_TOKEN="$TMP_STK" \
              aws ssm get-parameter --name "$PARAM_NAME" --query 'Parameter.Value' --output text 2>/dev/null || echo "")

            if [ -n "$VAL" ]; then
              local DISPLAY_VAL="$VAL"
              if echo "$PARAM_NAME" | grep -qiE "arn|secret|password|key"; then
                DISPLAY_VAL="${VAL:0:20}..."
              fi
              local CUST_ACC
              CUST_ACC=$(AWS_ACCESS_KEY_ID="$TMP_AKI" AWS_SECRET_ACCESS_KEY="$TMP_SAK" AWS_SESSION_TOKEN="$TMP_STK" \
                aws sts get-caller-identity --query Account --output text 2>/dev/null || echo "unknown")
              echo "| $LABEL (customer acct ${CUST_ACC}) | ✅ | \`$DISPLAY_VAL\` |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $LABEL | ⚠️ Missing in customer account SSM | — |" >> $GITHUB_STEP_SUMMARY
              WARNINGS=$((WARNINGS + 1))
            fi
          }

          check_ssm_customer "${SSM_PREFIX}/dynamodb/customer-table" "DP Table Name"
          check_ssm_customer "${SSM_PREFIX}/cross-account/customer-account-role-arn" "Customer Role ARN"
          check_ssm_customer "${SSM_PREFIX}/cloudformation/execution-role-arn" "CFn Execution Role"

          # Get API URL
          API_URL=$(aws ssm get-parameter \
            --name "/${PROJECT}/${ENV}/api/base-url" \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Errors:** ${ERRORS} | **Warnings:** ${WARNINGS}" >> $GITHUB_STEP_SUMMARY

          if [ "$ERRORS" -eq 0 ]; then
            echo "ssm_ok=true" >> $GITHUB_OUTPUT
          else
            echo "ssm_ok=false" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # Step 2: Seed comprehensive sample data (optional)
  # ===========================================================================
  seed-data:
    name: "Seed Sample Data (${{ needs.resolve.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [resolve, verify-ssm]
    if: >
      needs.resolve.outputs.should_run == 'true' &&
      needs.resolve.outputs.seed_data == 'true' &&
      needs.verify-ssm.outputs.ssm_ok == 'true'
    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Backend Dependencies
        working-directory: backend
        run: |
          npm install --package-lock-only 2>/dev/null || true
          npm install

      - name: Configure AWS Credentials (Platform Admin via OIDC)
        id: aws_oidc
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}-${{ github.job }}
          retry-max-attempts: 12
        continue-on-error: true

      - name: Validate fallback static key availability
        if: steps.aws_oidc.outcome != 'success'
        env:
          FALLBACK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          FALLBACK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
        run: |
          if [ -z "${FALLBACK_AWS_ACCESS_KEY_ID}" ] || [ -z "${FALLBACK_AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::OIDC auth failed and fallback static keys are not configured."
            exit 1
          fi

      - name: Configure AWS Credentials (Platform Admin via static fallback)
        if: steps.aws_oidc.outcome != 'success'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Seed data to control-plane (Platform Admin)
        working-directory: backend
        env:
          CONTROL_PLANE_TABLE_NAME: ${{ env.PROJECT }}-${{ needs.resolve.outputs.environment }}-control-plane
          DYNAMODB_TABLE_NAME: ${{ env.PROJECT }}-${{ needs.resolve.outputs.environment }}-control-plane
          NODE_ENV: ${{ needs.resolve.outputs.environment }}
          CI: "true"
        run: |
          echo "Seeding control-plane data (Platform Admin account)..."
          npx ts-node -P tsconfig.scripts.json scripts/seed-sample-data.ts || {
            echo "::warning::Seed script exited with non-zero code (control-plane)"
          }
          echo "### Seed Data" >> $GITHUB_STEP_SUMMARY
          echo "✅ Control-plane seeded: \`${CONTROL_PLANE_TABLE_NAME}\`" >> $GITHUB_STEP_SUMMARY

      - name: Assume cross-account role for data-plane seeding
        if: needs.resolve.outputs.seed_to_data_plane == 'true'
        id: assume-dp
        env:
          DATA_PLANE_ROLE_ARN: ${{ secrets.DATA_PLANE_ROLE_ARN }}
          CROSS_ACCOUNT_EXTERNAL_ID: ${{ secrets.CROSS_ACCOUNT_EXTERNAL_ID }}
        run: |
          set -euo pipefail

          if [ -z "${DATA_PLANE_ROLE_ARN:-}" ]; then
            echo "::warning::DATA_PLANE_ROLE_ARN not set — skipping data-plane seed"
            echo "assumed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          ASSUME_ARGS="--role-arn ${DATA_PLANE_ROLE_ARN} --role-session-name smoke-seed-dp-${GITHUB_RUN_ID} --duration-seconds 900"
          if [ -n "${CROSS_ACCOUNT_EXTERNAL_ID:-}" ]; then
            ASSUME_ARGS="${ASSUME_ARGS} --external-id ${CROSS_ACCOUNT_EXTERNAL_ID}"
          fi

          ASSUMED=$(aws sts assume-role $ASSUME_ARGS --output json)
          echo "::add-mask::$(echo "$ASSUMED" | jq -r '.Credentials.SecretAccessKey')"
          echo "::add-mask::$(echo "$ASSUMED" | jq -r '.Credentials.SessionToken')"

          echo "dp_aki=$(echo "$ASSUMED" | jq -r '.Credentials.AccessKeyId')" >> $GITHUB_OUTPUT
          echo "dp_sak=$(echo "$ASSUMED" | jq -r '.Credentials.SecretAccessKey')" >> $GITHUB_OUTPUT
          echo "dp_stk=$(echo "$ASSUMED" | jq -r '.Credentials.SessionToken')" >> $GITHUB_OUTPUT
          echo "assumed=true" >> $GITHUB_OUTPUT

          CUST_ACCOUNT=$(AWS_ACCESS_KEY_ID=$(echo "$ASSUMED" | jq -r '.Credentials.AccessKeyId') \
            AWS_SECRET_ACCESS_KEY=$(echo "$ASSUMED" | jq -r '.Credentials.SecretAccessKey') \
            AWS_SESSION_TOKEN=$(echo "$ASSUMED" | jq -r '.Credentials.SessionToken') \
            aws sts get-caller-identity --query Account --output text)
          echo "✅ Assumed role in customer account: ${CUST_ACCOUNT}"

      - name: Seed data to data-plane (Customer Account)
        if: needs.resolve.outputs.seed_to_data_plane == 'true' && steps.assume-dp.outputs.assumed == 'true'
        working-directory: backend
        env:
          DYNAMODB_TABLE_NAME: account-admin-public-${{ needs.resolve.outputs.environment }}
          DATA_PLANE_TABLE_NAME: account-admin-public-${{ needs.resolve.outputs.environment }}
          AWS_ACCESS_KEY_ID: ${{ steps.assume-dp.outputs.dp_aki }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.assume-dp.outputs.dp_sak }}
          AWS_SESSION_TOKEN: ${{ steps.assume-dp.outputs.dp_stk }}
          NODE_ENV: ${{ needs.resolve.outputs.environment }}
          CI: "true"
        run: |
          echo "Seeding data-plane data (Customer Account)..."
          npx ts-node -P tsconfig.scripts.json scripts/seed-sample-data.ts || {
            echo "::warning::Seed script exited with non-zero code (data-plane)"
          }
          echo "✅ Data-plane seeded: \`${DATA_PLANE_TABLE_NAME}\` (customer account)" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Step 3: Comprehensive API Smoke Tests
  # ===========================================================================
  smoke-test:
    name: "API Regression Tests (${{ needs.resolve.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [resolve, verify-ssm, seed-data]
    if: >
      always() &&
      needs.resolve.outputs.should_run == 'true' &&
      needs.verify-ssm.result == 'success' &&
      (needs.seed-data.result == 'success' || needs.seed-data.result == 'skipped')
    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - name: Configure AWS Credentials (Platform Admin via OIDC)
        id: aws_oidc
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}-${{ github.job }}
          retry-max-attempts: 12
        continue-on-error: true

      - name: Validate fallback static key availability
        if: steps.aws_oidc.outcome != 'success'
        env:
          FALLBACK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          FALLBACK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
        run: |
          if [ -z "${FALLBACK_AWS_ACCESS_KEY_ID}" ] || [ -z "${FALLBACK_AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::OIDC auth failed and fallback static keys are not configured."
            exit 1
          fi

      - name: Configure AWS Credentials (Platform Admin via static fallback)
        if: steps.aws_oidc.outcome != 'success'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve API Gateway URL
        id: api
        run: |
          API_URL="${{ needs.verify-ssm.outputs.api_url }}"
          if [ -z "$API_URL" ]; then
            API_ID=$(aws apigateway get-rest-apis \
              --query "items[?name=='${PROJECT}-${{ needs.resolve.outputs.environment }}'].id" \
              --output text 2>/dev/null || echo "")
            if [ -n "$API_ID" ]; then
              API_URL="https://${API_ID}.execute-api.${AWS_REGION}.amazonaws.com/${{ needs.resolve.outputs.environment }}"
            fi
          fi

          if [ -z "$API_URL" ]; then
            echo "::error::Could not resolve API Gateway URL"
            exit 1
          fi

          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "API URL: $API_URL"

      - name: Get Cognito token
        id: auth
        if: needs.resolve.outputs.skip_auth != 'true'
        env:
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.BOOTSTRAP_ADMIN_EMAIL || 'tripleh1701@gmail.com' }}
        run: |
          set -euo pipefail

          if [ -z "$COGNITO_USER_POOL_ID" ] || [ -z "$COGNITO_CLIENT_ID" ] || [ -z "$ADMIN_PASSWORD" ]; then
            echo "::warning::Cognito credentials not configured — auth tests will be skipped"
            echo "has_token=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          AUTH_RESULT=$(aws cognito-idp admin-initiate-auth \
            --user-pool-id "$COGNITO_USER_POOL_ID" \
            --client-id "$COGNITO_CLIENT_ID" \
            --auth-flow ADMIN_NO_SRP_AUTH \
            --auth-parameters USERNAME="$ADMIN_EMAIL",PASSWORD="$ADMIN_PASSWORD" \
            --query 'AuthenticationResult.IdToken' \
            --output text 2>/dev/null || echo "")

          if [ -n "$AUTH_RESULT" ] && [ "$AUTH_RESULT" != "None" ]; then
            echo "::add-mask::$AUTH_RESULT"
            echo "token=$AUTH_RESULT" >> $GITHUB_OUTPUT
            echo "has_token=true" >> $GITHUB_OUTPUT
            echo "✅ Cognito authentication successful"
          else
            echo "::warning::Cognito authentication failed — auth tests will be skipped"
            echo "has_token=false" >> $GITHUB_OUTPUT
          fi

      - name: Run comprehensive API regression tests
        id: tests
        env:
          API_URL: ${{ steps.api.outputs.api_url }}
          TOKEN: ${{ steps.auth.outputs.token }}
          HAS_TOKEN: ${{ steps.auth.outputs.has_token }}
          ADMIN_EMAIL: ${{ secrets.BOOTSTRAP_ADMIN_EMAIL || 'tripleh1701@gmail.com' }}
        run: |
          set -euo pipefail

          TOTAL=0
          PASSED=0
          FAILED=0
          SKIPPED=0
          RESULTS=""

          # Stores created resource IDs for cleanup
          CREATED_PIPELINE_ID=""
          CREATED_BUILD_ID=""
          CREATED_CONNECTOR_ID=""
          CREATED_CREDENTIAL_ID=""
          CREATED_ENVIRONMENT_ID=""
          CREATED_WORKSTREAM_ID=""
          CREATED_GROUP_ID=""
          CREATED_ROLE_ID=""

          ACCT="a0000000-0000-0000-0000-000000000001"
          ENT="00000000-0000-0000-0000-000000000001"

          # Helper function for API calls
          test_endpoint() {
            local METHOD="$1"
            local ENDPOINT_PATH="$2"
            local EXPECTED="$3"
            local DESCRIPTION="$4"
            local NEEDS_AUTH="${5:-true}"
            local BODY="${6:-}"
            local CAPTURE_ID="${7:-}"

            TOTAL=$((TOTAL + 1))

            if [ "$NEEDS_AUTH" == "true" ] && [ "$HAS_TOKEN" != "true" ]; then
              SKIPPED=$((SKIPPED + 1))
              RESULTS="${RESULTS}\n| ${DESCRIPTION} | ⏭️ Skipped | No auth token | \`${METHOD} ${ENDPOINT_PATH}\` |"
              return
            fi

            CURL_ARGS=(-s -o /tmp/response.json -w "%{http_code}" --max-time 30)

            if [ "$NEEDS_AUTH" == "true" ]; then
              CURL_ARGS+=(-H "Authorization: Bearer ${TOKEN}")
            fi

            CURL_ARGS+=(-H "Content-Type: application/json")

            if [ -n "$BODY" ]; then
              CURL_ARGS+=(-d "$BODY")
            fi

            case "$METHOD" in
              POST)   CURL_ARGS+=(-X POST) ;;
              PUT)    CURL_ARGS+=(-X PUT) ;;
              PATCH)  CURL_ARGS+=(-X PATCH) ;;
              DELETE) CURL_ARGS+=(-X DELETE) ;;
            esac

            HTTP_CODE=$(curl "${CURL_ARGS[@]}" "${API_URL}/api${ENDPOINT_PATH}" 2>/dev/null || echo "000")
            RESPONSE_BODY=$(cat /tmp/response.json 2>/dev/null || echo "{}")

            # Check if status matches expected (support comma-separated list)
            MATCH=false
            IFS=',' read -ra EXP_CODES <<< "$EXPECTED"
            for EXP in "${EXP_CODES[@]}"; do
              if [ "$HTTP_CODE" == "$EXP" ]; then
                MATCH=true
                break
              fi
            done

            if [ "$MATCH" == "true" ]; then
              PASSED=$((PASSED + 1))
              RESULTS="${RESULTS}\n| ${DESCRIPTION} | ✅ ${HTTP_CODE} | OK | \`${METHOD} ${ENDPOINT_PATH}\` |"

              # Capture ID if requested
              if [ -n "$CAPTURE_ID" ]; then
                local ID_VAL
                ID_VAL=$(echo "$RESPONSE_BODY" | jq -r '.data.id // .id // empty' 2>/dev/null || echo "")
                if [ -n "$ID_VAL" ]; then
                  eval "${CAPTURE_ID}=${ID_VAL}"
                fi
              fi
            else
              FAILED=$((FAILED + 1))
              ERR_MSG=$(echo "$RESPONSE_BODY" | jq -r '.error.message // .message // "Unknown error"' 2>/dev/null)
              ERR_MSG="${ERR_MSG:0:80}"
              RESULTS="${RESULTS}\n| ${DESCRIPTION} | ❌ ${HTTP_CODE} | ${ERR_MSG} | \`${METHOD} ${ENDPOINT_PATH}\` |"
            fi
          }

          echo "🧪 Running comprehensive API regression tests against ${API_URL}..."
          echo ""

          # ╔═══════════════════════════════════════════════════════╗
          # ║  SECTION 1: Health & Public Endpoints                  ║
          # ╚═══════════════════════════════════════════════════════╝

          test_endpoint "GET" "/health" "200" "Health Check" "false"
          test_endpoint "GET" "/health/config" "200" "Health Config" "false"
          test_endpoint "GET" "/health/preflight-assume-role" "200" "Health Preflight AssumeRole" "false"
          test_endpoint "GET" "/health/full?accountId=${ACCT}" "200" "Health Full Diagnostics" "false"
          test_endpoint "GET" "/health/routing/${ACCT}" "200,500" "Health Routing Check" "true"

          # ╔═══════════════════════════════════════════════════════╗
          # ║  SECTION 2: Read-Only (GET) Endpoints — All Entities  ║
          # ╚═══════════════════════════════════════════════════════╝

          # ── Accounts ────────────────────────────────────────────
          test_endpoint "GET" "/accounts" "200" "List Accounts" "true"
          test_endpoint "GET" "/accounts/${ACCT}" "200" "Get Account by ID" "true"
          test_endpoint "GET" "/accounts/check-name?name=nonexistent-smoke-xyz" "200" "Account Name Check" "true"

          # ── Enterprises ─────────────────────────────────────────
          test_endpoint "GET" "/enterprises" "200" "List Enterprises" "true"
          test_endpoint "GET" "/enterprises/${ENT}" "200" "Get Enterprise by ID" "true"

          # ── Enterprise Products ─────────────────────────────────
          test_endpoint "GET" "/enterprise-products" "200" "List Enterprise Products" "true"

          # ── Products ────────────────────────────────────────────
          test_endpoint "GET" "/products" "200" "List Products" "true"

          # ── Services ────────────────────────────────────────────
          test_endpoint "GET" "/services" "200" "List Services" "true"

          # ── Users ───────────────────────────────────────────────
          test_endpoint "GET" "/users?accountId=${ACCT}" "200" "List Users" "true"
          test_endpoint "GET" "/users/me/preferences" "200,404" "Get User Preferences" "true"
          test_endpoint "GET" "/users/me/access" "200" "Get My Access (accounts + roles)" "true"
          test_endpoint "GET" "/users/me/permissions?accountId=${ACCT}&enterpriseId=${ENT}" "200" "Get My Permissions" "true"
          test_endpoint "GET" "/users/capacity?accountId=${ACCT}" "200,404" "User License Capacity" "true"
          test_endpoint "GET" "/users/check-email?email=${ADMIN_EMAIL}&accountId=${ACCT}" "200" "Check Email Exists" "true"

          # ── Groups ──────────────────────────────────────────────
          test_endpoint "GET" "/groups?accountId=${ACCT}" "200" "List Groups" "true"

          # ── Roles ───────────────────────────────────────────────
          test_endpoint "GET" "/roles?accountId=${ACCT}" "200" "List Roles" "true"

          # ── Licenses ────────────────────────────────────────────
          test_endpoint "GET" "/licenses?accountId=${ACCT}" "200" "List Licenses" "true"
          test_endpoint "GET" "/licenses/capacity?accountId=${ACCT}" "200,404" "License Capacity" "true"

          # ── Workstreams ─────────────────────────────────────────
          test_endpoint "GET" "/workstreams?accountId=${ACCT}" "200" "List Workstreams" "true"

          # ── Connectors (data-plane routed) ──────────────────────
          test_endpoint "GET" "/connectors?accountId=${ACCT}" "200" "List Connectors" "true"

          # ── Credentials (data-plane routed) ─────────────────────
          test_endpoint "GET" "/credentials?accountId=${ACCT}" "200" "List Credentials" "true"

          # ── Environments (data-plane routed) ────────────────────
          test_endpoint "GET" "/environments?accountId=${ACCT}" "200" "List Environments" "true"

          # ── Pipelines (data-plane routed) ───────────────────────
          test_endpoint "GET" "/pipelines?accountId=${ACCT}" "200" "List Pipelines" "true"
          test_endpoint "GET" "/pipelines/stats?accountId=${ACCT}" "200" "Pipeline Stats" "true"

          # ── Builds (data-plane routed) ──────────────────────────
          test_endpoint "GET" "/builds?accountId=${ACCT}" "200" "List Builds" "true"
          test_endpoint "GET" "/build-jobs?accountId=${ACCT}" "200" "List Build Jobs" "true"

          # ── Executions ──────────────────────────────────────────
          test_endpoint "GET" "/executions?accountId=${ACCT}" "200" "List Executions" "true"

          # ── Pipeline Configs ────────────────────────────────────
          test_endpoint "GET" "/pipeline-configs?accountId=${ACCT}" "200" "List Pipeline Configs" "true"

          # ── Integration Artifacts ───────────────────────────────
          test_endpoint "GET" "/integration-artifacts?accountId=${ACCT}" "200" "List Integration Artifacts" "true"

          # ── Inbox ───────────────────────────────────────────────
          test_endpoint "GET" "/inbox?accountId=${ACCT}" "200" "List Inbox" "true"

          # ── Notification History ────────────────────────────────
          test_endpoint "GET" "/notification-history?accountId=${ACCT}" "200" "Notification History" "true"

          # ── Notification Audit ──────────────────────────────────
          test_endpoint "GET" "/notification-audit" "200,403" "Notification Audit" "true"
          test_endpoint "GET" "/notification-audit?accountId=${ACCT}&limit=5" "200,403" "Notification Audit (scoped)" "true"

          # ╔═══════════════════════════════════════════════════════╗
          # ║  SECTION 3: CRUD Tests (Create → Verify → Delete)     ║
          # ╚═══════════════════════════════════════════════════════╝

          # ── Pipeline CRUD ───────────────────────────────────────
          test_endpoint "POST" "/pipelines" "201,200" "Create Pipeline" "true" \
            "{\"name\":\"smoke-test-regression-pipeline\",\"status\":\"draft\",\"deploymentType\":\"Integration\",\"nodes\":[],\"edges\":[],\"accountId\":\"${ACCT}\",\"enterpriseId\":\"${ENT}\"}" \
            "CREATED_PIPELINE_ID"

          if [ -n "$CREATED_PIPELINE_ID" ]; then
            test_endpoint "GET" "/pipelines/${CREATED_PIPELINE_ID}?accountId=${ACCT}" "200" "Get Created Pipeline" "true"
            test_endpoint "PUT" "/pipelines/${CREATED_PIPELINE_ID}" "200" "Update Pipeline" "true" \
              "{\"name\":\"smoke-test-regression-pipeline-updated\",\"status\":\"draft\",\"deploymentType\":\"Integration\",\"nodes\":[],\"edges\":[],\"accountId\":\"${ACCT}\",\"enterpriseId\":\"${ENT}\"}"
          fi

          # ── Build Job CRUD ──────────────────────────────────────
          test_endpoint "POST" "/builds" "201,200" "Create Build Job" "true" \
            "{\"connectorName\":\"smoke-test-regression\",\"product\":\"DevOps\",\"service\":\"Integration\",\"accountId\":\"${ACCT}\",\"enterpriseId\":\"${ENT}\"}" \
            "CREATED_BUILD_ID"

          # ── Connector CRUD ──────────────────────────────────────
          test_endpoint "POST" "/connectors" "201,200" "Create Connector" "true" \
            "{\"name\":\"smoke-test-regression-connector\",\"connectorType\":\"CI/CD\",\"connectorTool\":\"Jenkins\",\"category\":\"Build\",\"accountId\":\"${ACCT}\",\"enterpriseId\":\"${ENT}\"}" \
            "CREATED_CONNECTOR_ID"

          # ── Credential CRUD ─────────────────────────────────────
          test_endpoint "POST" "/credentials" "201,200" "Create Credential" "true" \
            "{\"name\":\"smoke-test-regression-cred\",\"connector\":\"Jenkins\",\"authType\":\"token\",\"category\":\"CI/CD\",\"accountId\":\"${ACCT}\",\"enterpriseId\":\"${ENT}\"}" \
            "CREATED_CREDENTIAL_ID"

          # ── Environment CRUD ────────────────────────────────────
          test_endpoint "POST" "/environments" "201,200" "Create Environment" "true" \
            "{\"name\":\"smoke-test-regression-env\",\"description\":\"Smoke test environment\",\"connectors\":[],\"accountId\":\"${ACCT}\",\"enterpriseId\":\"${ENT}\"}" \
            "CREATED_ENVIRONMENT_ID"

          # ── Workstream CRUD ─────────────────────────────────────
          test_endpoint "POST" "/workstreams" "201,200" "Create Workstream" "true" \
            "{\"name\":\"smoke-test-regression-ws\",\"accountId\":\"${ACCT}\",\"enterpriseId\":\"${ENT}\"}" \
            "CREATED_WORKSTREAM_ID"

          # ── Group CRUD ──────────────────────────────────────────
          test_endpoint "POST" "/groups" "201,200" "Create Group" "true" \
            "{\"name\":\"smoke-test-regression-group\",\"description\":\"Smoke test group\",\"accountId\":\"${ACCT}\",\"enterpriseId\":\"${ENT}\"}" \
            "CREATED_GROUP_ID"

          # ── Role CRUD ───────────────────────────────────────────
          test_endpoint "POST" "/roles" "201,200" "Create Role" "true" \
            "{\"name\":\"smoke-test-regression-role\",\"description\":\"Smoke test role\",\"accountId\":\"${ACCT}\"}" \
            "CREATED_ROLE_ID"

          # ── Inbox Test ──────────────────────────────────────────
          test_endpoint "POST" "/inbox/test" "201,200" "Create Test Inbox Notification" "true" \
            "{\"accountId\":\"${ACCT}\"}"

          # ╔═══════════════════════════════════════════════════════╗
          # ║  SECTION 4: Cleanup CRUD-Created Resources            ║
          # ╚═══════════════════════════════════════════════════════╝

          if [ -n "$CREATED_PIPELINE_ID" ]; then
            test_endpoint "DELETE" "/pipelines/${CREATED_PIPELINE_ID}?accountId=${ACCT}" "200,204" "Delete Pipeline" "true"
          fi
          if [ -n "$CREATED_BUILD_ID" ]; then
            test_endpoint "DELETE" "/builds/${CREATED_BUILD_ID}?accountId=${ACCT}" "200,204" "Delete Build Job" "true"
          fi
          if [ -n "$CREATED_CONNECTOR_ID" ]; then
            test_endpoint "DELETE" "/connectors/${CREATED_CONNECTOR_ID}?accountId=${ACCT}" "200,204" "Delete Connector" "true"
          fi
          if [ -n "$CREATED_CREDENTIAL_ID" ]; then
            test_endpoint "DELETE" "/credentials/${CREATED_CREDENTIAL_ID}?accountId=${ACCT}" "200,204" "Delete Credential" "true"
          fi
          if [ -n "$CREATED_ENVIRONMENT_ID" ]; then
            test_endpoint "DELETE" "/environments/${CREATED_ENVIRONMENT_ID}?accountId=${ACCT}" "200,204" "Delete Environment" "true"
          fi
          if [ -n "$CREATED_WORKSTREAM_ID" ]; then
            test_endpoint "DELETE" "/workstreams/${CREATED_WORKSTREAM_ID}?accountId=${ACCT}" "200,204" "Delete Workstream" "true"
          fi
          if [ -n "$CREATED_GROUP_ID" ]; then
            test_endpoint "DELETE" "/groups/${CREATED_GROUP_ID}?accountId=${ACCT}" "200,204" "Delete Group" "true"
          fi
          if [ -n "$CREATED_ROLE_ID" ]; then
            test_endpoint "DELETE" "/roles/${CREATED_ROLE_ID}?accountId=${ACCT}" "200,204" "Delete Role" "true"
          fi

          # ╔═══════════════════════════════════════════════════════╗
          # ║  SECTION 5: RBAC Verification                         ║
          # ╚═══════════════════════════════════════════════════════╝

          # These verify the admin user has correct role/permissions
          test_endpoint "GET" "/roles/backfill-permissions" "200,404,405" "RBAC Backfill Check" "true"
          test_endpoint "GET" "/bootstrap/status" "200,404" "Bootstrap Status" "true"

          # ── Summary ─────────────────────────────────────────────
          echo ""
          echo "================================================"
          echo "  Results: ${PASSED}/${TOTAL} passed, ${FAILED} failed, ${SKIPPED} skipped"
          echo "================================================"

          echo "## 🧪 API Regression Test Results — ${{ needs.resolve.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status | Details | Path |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|---------|------|" >> $GITHUB_STEP_SUMMARY
          printf '%b\n' "$RESULTS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | ${PASSED} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | ${FAILED} |" >> $GITHUB_STEP_SUMMARY

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED} regression tests failed"
            exit 1
          fi

  # ===========================================================================
  # Step 4: Verify SES Email & Cognito Configuration
  # ===========================================================================
  verify-email-auth:
    name: "Verify SES & Cognito (${{ needs.resolve.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [resolve, verify-ssm, smoke-test]
    if: >
      always() &&
      needs.resolve.outputs.should_run == 'true' &&
      needs.verify-ssm.result == 'success' &&
      needs.resolve.outputs.skip_auth != 'true'
    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - name: Configure AWS Credentials (Platform Admin via OIDC)
        id: aws_oidc
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}-${{ github.job }}
          retry-max-attempts: 12
        continue-on-error: true

      - name: Validate fallback static key availability
        if: steps.aws_oidc.outcome != 'success'
        env:
          FALLBACK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          FALLBACK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
        run: |
          if [ -z "${FALLBACK_AWS_ACCESS_KEY_ID}" ] || [ -z "${FALLBACK_AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::OIDC auth failed and fallback static keys are not configured."
            exit 1
          fi

      - name: Configure AWS Credentials (Platform Admin via static fallback)
        if: steps.aws_oidc.outcome != 'success'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify SES sender identity & send test
        id: ses
        run: |
          set -euo pipefail

          ENV="${{ needs.resolve.outputs.environment }}"
          LAMBDA_NAME="${PROJECT}-${ENV}-backend"

          # ── Step 0: Always resolve sender email from Lambda config (single source of truth) ──
          LAMBDA_ENV=$(aws lambda get-function-configuration \
            --function-name "$LAMBDA_NAME" \
            --query 'Environment.Variables' \
            --output json 2>/dev/null || echo "{}")

          SES_SENDER_EMAIL=$(echo "$LAMBDA_ENV" | jq -r '.SES_SENDER_EMAIL // empty' 2>/dev/null || echo "")

          if [ -z "$SES_SENDER_EMAIL" ]; then
            echo "::error::SES_SENDER_EMAIL not found in Lambda ${LAMBDA_NAME} environment variables"
            echo "## ❌ SES Verification Failed" >> $GITHUB_STEP_SUMMARY
            echo "Could not resolve sender email from Lambda \`${LAMBDA_NAME}\`." >> $GITHUB_STEP_SUMMARY
            echo "Ensure \`SES_SENDER_EMAIL\` is set in Lambda environment variables via Terraform." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "Resolved sender email from Lambda config: ${SES_SENDER_EMAIL}"

          echo "## 📧 SES & Email Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          SES_ERRORS=0

          # ── 1. Check SES sending quota (try SESv2 first, fallback to v1) ──
          QUOTA=""
          PRODUCTION_ACCESS="false"
          if QUOTA_V2=$(aws sesv2 get-account --output json 2>&1); then
            if echo "$QUOTA_V2" | jq -e '.SendQuota' >/dev/null 2>&1; then
              MAX_24H=$(echo "$QUOTA_V2" | jq -r '.SendQuota.Max24HourSend // "N/A"')
              SENT_24H=$(echo "$QUOTA_V2" | jq -r '.SendQuota.SentLast24Hours // "N/A"')
              MAX_RATE=$(echo "$QUOTA_V2" | jq -r '.SendQuota.MaxSendRate // "N/A"')
              PRODUCTION_ACCESS=$(echo "$QUOTA_V2" | jq -r '.ProductionAccessEnabled // false')
              QUOTA="v2"
            fi
          fi
          if [ -z "$QUOTA" ]; then
            if QUOTA_V1=$(aws ses get-send-quota --output json 2>&1); then
              if echo "$QUOTA_V1" | jq -e '.Max24HourSend' >/dev/null 2>&1; then
                MAX_24H=$(echo "$QUOTA_V1" | jq -r '.Max24HourSend // "N/A"')
                SENT_24H=$(echo "$QUOTA_V1" | jq -r '.SentLast24Hours // "N/A"')
                MAX_RATE=$(echo "$QUOTA_V1" | jq -r '.MaxSendRate // "N/A"')
                QUOTA="v1"
              fi
            fi
          fi

          if [ -n "$QUOTA" ]; then
            echo "| SES Send Quota (${QUOTA}) | ✅ | Max: ${MAX_24H}/day, Sent: ${SENT_24H}, Rate: ${MAX_RATE}/s |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SES Send Quota | ⚠️ | Could not retrieve quota — add \`ses:GetSendQuota\` + \`sesv2:GetAccount\` to OIDC role |" >> $GITHUB_STEP_SUMMARY
            SES_ERRORS=$((SES_ERRORS + 1))
          fi

          # ── 2. Check if sender email/domain is verified ──
          SENDER_OK=false

          # SESv2: check email identity directly
          if IDENTITY_V2=$(aws sesv2 get-email-identity --email-identity "$SES_SENDER_EMAIL" --output json 2>/dev/null); then
            ID_STATUS=$(echo "$IDENTITY_V2" | jq -r '.VerifiedForSendingStatus // false')
            if [ "$ID_STATUS" == "true" ]; then
              echo "| Sender Email (\`${SES_SENDER_EMAIL}\`) | ✅ Verified (SESv2) | — |" >> $GITHUB_STEP_SUMMARY
              SENDER_OK=true
            fi
          fi

          # SESv2: check domain identity
          if [ "$SENDER_OK" != "true" ]; then
            DOMAIN=$(echo "$SES_SENDER_EMAIL" | cut -d@ -f2)
            if DOMAIN_V2=$(aws sesv2 get-email-identity --email-identity "$DOMAIN" --output json 2>/dev/null); then
              DOMAIN_VERIFIED=$(echo "$DOMAIN_V2" | jq -r '.VerifiedForSendingStatus // false')
              if [ "$DOMAIN_VERIFIED" == "true" ]; then
                echo "| Sender Domain (\`${DOMAIN}\`) | ✅ Domain verified (SESv2) | — |" >> $GITHUB_STEP_SUMMARY
                SENDER_OK=true
              fi
            fi
          fi

          # Fallback: SES v1 classic APIs
          if [ "$SENDER_OK" != "true" ]; then
            VERIFIED_EMAILS=$(aws ses list-verified-email-addresses --query 'VerifiedEmailAddresses' --output json 2>/dev/null || echo "[]")
            V1_COUNT=$(echo "$VERIFIED_EMAILS" | jq -r --arg email "$SES_SENDER_EMAIL" 'map(select(ascii_downcase == ($email | ascii_downcase))) | length')
            if [ "$V1_COUNT" -gt 0 ]; then
              echo "| Sender Email (\`${SES_SENDER_EMAIL}\`) | ✅ Verified (SES classic) | — |" >> $GITHUB_STEP_SUMMARY
              SENDER_OK=true
            else
              DOMAIN=$(echo "$SES_SENDER_EMAIL" | cut -d@ -f2)
              DOMAIN_STATUS=$(aws ses get-identity-verification-attributes \
                --identities "$DOMAIN" \
                --query "VerificationAttributes.\"${DOMAIN}\".VerificationStatus" \
                --output text 2>/dev/null || echo "unknown")
              if [ "$DOMAIN_STATUS" == "Success" ]; then
                echo "| Sender Domain (\`${DOMAIN}\`) | ✅ Domain verified | — |" >> $GITHUB_STEP_SUMMARY
                SENDER_OK=true
              else
                echo "| Sender Email (\`${SES_SENDER_EMAIL}\`) | ⚠️ Not verified | Domain status: ${DOMAIN_STATUS} |" >> $GITHUB_STEP_SUMMARY
                SES_ERRORS=$((SES_ERRORS + 1))
              fi
            fi
          fi

          # ── 3. Check SES sandbox/production status ──
          if [ "$PRODUCTION_ACCESS" == "true" ]; then
            echo "| SES Sending | ✅ Enabled | Production access (SESv2) |" >> $GITHUB_STEP_SUMMARY
          else
            ACCOUNT_SENDING=$(aws ses get-account-sending-enabled --output text 2>/dev/null || echo "false")
            if [ "$ACCOUNT_SENDING" == "True" ] || [ "$ACCOUNT_SENDING" == "true" ]; then
              echo "| SES Sending | ✅ Enabled | Production mode |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| SES Sending | ⚠️ Sandbox | May need production access request |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # ── 4. Report Lambda email env vars ──
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lambda Email Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          for VAR in CREDENTIAL_NOTIFICATION_ENABLED SES_SENDER_EMAIL PLATFORM_LOGIN_URL PLATFORM_NAME PLATFORM_SUPPORT_EMAIL; do
            VAL=$(echo "$LAMBDA_ENV" | jq -r --arg k "$VAR" '.[$k] // empty' 2>/dev/null || echo "")
            if [ -n "$VAL" ]; then
              if echo "$VAR" | grep -qiE "email|url|name"; then
                echo "| \`${VAR}\` | ✅ \`${VAL}\` |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| \`${VAR}\` | ✅ Set |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| \`${VAR}\` | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
              SES_ERRORS=$((SES_ERRORS + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SES Issues:** ${SES_ERRORS}" >> $GITHUB_STEP_SUMMARY

          if [ "$SES_ERRORS" -gt 0 ]; then
            echo "::warning::${SES_ERRORS} SES/email configuration issues found"
          fi

      - name: Verify Cognito User Pool configuration
        id: cognito
        run: |
          set -euo pipefail

          ENV="${{ needs.resolve.outputs.environment }}"
          LAMBDA_NAME="${PROJECT}-${ENV}-backend"

          echo "## 🔐 Cognito Configuration Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          COGNITO_ERRORS=0

          # ── Resolve Cognito IDs from Lambda config (single source of truth) ──
          LAMBDA_ENV=$(aws lambda get-function-configuration \
            --function-name "$LAMBDA_NAME" \
            --query 'Environment.Variables' \
            --output json 2>/dev/null || echo "{}")

          COGNITO_USER_POOL_ID=$(echo "$LAMBDA_ENV" | jq -r '.COGNITO_USER_POOL_ID // empty' 2>/dev/null || echo "")
          COGNITO_CLIENT_ID=$(echo "$LAMBDA_ENV" | jq -r '.COGNITO_CLIENT_ID // empty' 2>/dev/null || echo "")
          COGNITO_REGION=$(echo "$LAMBDA_ENV" | jq -r '.COGNITO_REGION // empty' 2>/dev/null || echo "")
          ADMIN_EMAIL=$(echo "$LAMBDA_ENV" | jq -r '.ADMIN_EMAIL // empty' 2>/dev/null || echo "")

          if [ -z "$COGNITO_USER_POOL_ID" ]; then
            echo "⚠️ COGNITO_USER_POOL_ID not found in Lambda \`${LAMBDA_NAME}\` — skipping Cognito checks" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "| Check | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          # ── 1. Describe User Pool ──
          POOL_INFO=$(aws cognito-idp describe-user-pool \
            --user-pool-id "$COGNITO_USER_POOL_ID" --output json 2>/dev/null || echo "{}")

          POOL_NAME=$(echo "$POOL_INFO" | jq -r '.UserPool.Name // "Unknown"')
          USER_COUNT=$(echo "$POOL_INFO" | jq -r '.UserPool.EstimatedNumberOfUsers // 0')
          MFA_CONFIG=$(echo "$POOL_INFO" | jq -r '.UserPool.MfaConfiguration // "OFF"')

          if [ "$POOL_NAME" != "Unknown" ]; then
            echo "| User Pool | ✅ | \`${POOL_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| User Pool | ❌ | Could not describe pool \`${COGNITO_USER_POOL_ID}\` |" >> $GITHUB_STEP_SUMMARY
            COGNITO_ERRORS=$((COGNITO_ERRORS + 1))
          fi
          echo "| Users | ℹ️ | ~${USER_COUNT} estimated |" >> $GITHUB_STEP_SUMMARY
          echo "| MFA | ℹ️ | ${MFA_CONFIG} |" >> $GITHUB_STEP_SUMMARY

          # ── 2. Email configuration (SES vs Cognito default) ──
          EMAIL_CONFIG=$(echo "$POOL_INFO" | jq -r '.UserPool.EmailConfiguration.EmailSendingAccount // "COGNITO_DEFAULT"')
          EMAIL_SOURCE=$(echo "$POOL_INFO" | jq -r '.UserPool.EmailConfiguration.SourceArn // "N/A"')

          if [ "$EMAIL_CONFIG" == "DEVELOPER" ]; then
            echo "| Email Config | ✅ | SES (\`${EMAIL_SOURCE:0:60}...\`) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Email Config | ⚠️ | Cognito Default (limited to 50/day) — consider SES integration |" >> $GITHUB_STEP_SUMMARY
          fi

          # ── 3. Password policy ──
          PASS_POLICY=$(echo "$POOL_INFO" | jq '.UserPool.Policies.PasswordPolicy' 2>/dev/null || echo "{}")
          MIN_LEN=$(echo "$PASS_POLICY" | jq -r '.MinimumLength // 8')
          REQ_UPPER=$(echo "$PASS_POLICY" | jq -r '.RequireUppercase // false')
          REQ_LOWER=$(echo "$PASS_POLICY" | jq -r '.RequireLowercase // false')
          REQ_NUM=$(echo "$PASS_POLICY" | jq -r '.RequireNumbers // false')
          REQ_SYM=$(echo "$PASS_POLICY" | jq -r '.RequireSymbols // false')

          echo "| Password Policy | ✅ | Min:${MIN_LEN} Upper:${REQ_UPPER} Lower:${REQ_LOWER} Num:${REQ_NUM} Sym:${REQ_SYM} |" >> $GITHUB_STEP_SUMMARY

          # ── 4. Verify App Client ──
          if [ -n "$COGNITO_CLIENT_ID" ]; then
            CLIENT_INFO=$(aws cognito-idp describe-user-pool-client \
              --user-pool-id "$COGNITO_USER_POOL_ID" \
              --client-id "$COGNITO_CLIENT_ID" --output json 2>/dev/null || echo "{}")
            CLIENT_NAME=$(echo "$CLIENT_INFO" | jq -r '.UserPoolClient.ClientName // "Unknown"')
            AUTH_FLOWS=$(echo "$CLIENT_INFO" | jq -r '.UserPoolClient.ExplicitAuthFlows // [] | join(", ")' 2>/dev/null || echo "N/A")

            if [ "$CLIENT_NAME" != "Unknown" ]; then
              echo "| App Client | ✅ | \`${CLIENT_NAME}\` |" >> $GITHUB_STEP_SUMMARY
              echo "| Auth Flows | ℹ️ | ${AUTH_FLOWS} |" >> $GITHUB_STEP_SUMMARY

              # Verify required auth flow for smoke tests
              if echo "$AUTH_FLOWS" | grep -q "ALLOW_ADMIN_USER_PASSWORD_AUTH"; then
                echo "| Admin Auth Flow | ✅ | ALLOW_ADMIN_USER_PASSWORD_AUTH present |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| Admin Auth Flow | ⚠️ | ALLOW_ADMIN_USER_PASSWORD_AUTH missing — smoke test auth may fail |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| App Client | ❌ | Not found (\`${COGNITO_CLIENT_ID}\`) |" >> $GITHUB_STEP_SUMMARY
              COGNITO_ERRORS=$((COGNITO_ERRORS + 1))
            fi
          else
            echo "| App Client | ❌ | COGNITO_CLIENT_ID not set in Lambda env |" >> $GITHUB_STEP_SUMMARY
            COGNITO_ERRORS=$((COGNITO_ERRORS + 1))
          fi

          # ── 5. Verify admin user exists ──
          # Try ADMIN_EMAIL from Lambda env, fallback to COGNITO_ADMIN_EMAIL secret, then known default
          if [ -z "$ADMIN_EMAIL" ]; then
            ADMIN_EMAIL="${{ secrets.COGNITO_ADMIN_EMAIL }}"
          fi
          if [ -z "$ADMIN_EMAIL" ]; then
            # List first user as a connectivity check instead
            FIRST_USER=$(aws cognito-idp list-users \
              --user-pool-id "$COGNITO_USER_POOL_ID" \
              --limit 1 \
              --query 'Users[0].Username' \
              --output text 2>/dev/null || echo "")
            if [ -n "$FIRST_USER" ] && [ "$FIRST_USER" != "None" ]; then
              echo "| Pool Access | ✅ | Can list users (found: \`${FIRST_USER}\`) |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Pool Access | ⚠️ | No users found or cannot list users |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            ADMIN_USER=$(aws cognito-idp admin-get-user \
              --user-pool-id "$COGNITO_USER_POOL_ID" \
              --username "$ADMIN_EMAIL" \
              --query '{Status:UserStatus,Enabled:Enabled}' \
              --output json 2>/dev/null || echo "{}")

            ADMIN_STATUS=$(echo "$ADMIN_USER" | jq -r '.Status // "NOT_FOUND"')
            ADMIN_ENABLED=$(echo "$ADMIN_USER" | jq -r '.Enabled // false')

            if [ "$ADMIN_STATUS" == "CONFIRMED" ] && [ "$ADMIN_ENABLED" == "true" ]; then
              echo "| Admin User (\`${ADMIN_EMAIL}\`) | ✅ | Confirmed & Enabled |" >> $GITHUB_STEP_SUMMARY
            elif [ "$ADMIN_STATUS" == "FORCE_CHANGE_PASSWORD" ]; then
              echo "| Admin User (\`${ADMIN_EMAIL}\`) | ⚠️ | FORCE_CHANGE_PASSWORD (first login required) |" >> $GITHUB_STEP_SUMMARY
            elif [ "$ADMIN_STATUS" == "NOT_FOUND" ]; then
              echo "| Admin User (\`${ADMIN_EMAIL}\`) | ⚠️ | Not found in pool — create via console or provisioning |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Admin User (\`${ADMIN_EMAIL}\`) | ℹ️ | Status: ${ADMIN_STATUS}, Enabled: ${ADMIN_ENABLED} |" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # ── 6. Lambda Cognito env vars summary ──
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lambda Cognito Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          for VAR in COGNITO_USER_POOL_ID COGNITO_CLIENT_ID COGNITO_REGION; do
            VAL=$(echo "$LAMBDA_ENV" | jq -r --arg k "$VAR" '.[$k] // empty' 2>/dev/null || echo "")
            if [ -n "$VAL" ]; then
              echo "| \`${VAR}\` | ✅ Set |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| \`${VAR}\` | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
              COGNITO_ERRORS=$((COGNITO_ERRORS + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cognito Issues:** ${COGNITO_ERRORS}" >> $GITHUB_STEP_SUMMARY

          if [ "$COGNITO_ERRORS" -gt 0 ]; then
            echo "::warning::${COGNITO_ERRORS} Cognito configuration issues found"
          fi

  # ===========================================================================
  # Step 5: Verify DynamoDB entries in both tables
  # ===========================================================================
  verify-dynamodb:
    name: "Verify DynamoDB Entries (${{ needs.resolve.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [resolve, verify-ssm, seed-data, smoke-test, verify-email-auth]
    if: >
      always() &&
      needs.resolve.outputs.should_run == 'true' &&
      needs.verify-ssm.result == 'success' &&
      (needs.smoke-test.result == 'success' || needs.smoke-test.result == 'failure')
    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - name: Configure AWS Credentials (Platform Admin via OIDC)
        id: aws_oidc
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}-${{ github.job }}
          retry-max-attempts: 12
        continue-on-error: true

      - name: Validate fallback static key availability
        if: steps.aws_oidc.outcome != 'success'
        env:
          FALLBACK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          FALLBACK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
        run: |
          if [ -z "${FALLBACK_AWS_ACCESS_KEY_ID}" ] || [ -z "${FALLBACK_AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::OIDC auth failed and fallback static keys are not configured."
            exit 1
          fi

      - name: Configure AWS Credentials (Platform Admin via static fallback)
        if: steps.aws_oidc.outcome != 'success'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Audit DynamoDB table contents
        env:
          ENV: ${{ needs.resolve.outputs.environment }}
          ACCOUNT_ID: a0000000-0000-0000-0000-000000000001
        run: |
          set -euo pipefail

          CP_TABLE="${PROJECT}-${ENV}-control-plane"
          DP_TABLE="account-admin-public-${ENV}"

          echo "## 🗄️ DynamoDB Entry Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── Helper: count PK-prefix entities (SK=METADATA) ──
          count_pk_entity() {
            local TABLE="$1" ENTITY="$2"
            aws dynamodb scan \
              --table-name "$TABLE" \
              --filter-expression "begins_with(PK, :pk) AND SK = :sk" \
              --expression-attribute-values "{\":pk\":{\"S\":\"${ENTITY}#\"},\":sk\":{\"S\":\"METADATA\"}}" \
              --select COUNT --query 'Count' --output text 2>/dev/null || echo "0"
          }

          # ── Helper: count SK-prefix entities ──
          count_sk_entity() {
            local TABLE="$1" ENTITY="$2"
            aws dynamodb scan \
              --table-name "$TABLE" \
              --filter-expression "begins_with(SK, :sk)" \
              --expression-attribute-values "{\":sk\":{\"S\":\"${ENTITY}#\"}}" \
              --select COUNT --query 'Count' --output text 2>/dev/null || echo "0"
          }

          # ── Helper: emit row with architecture-aware status ──
          # $1=entity, $2=count, $3=expected_location ("here"|"other-table"|"optional")
          emit_row() {
            local ENTITY="$1" COUNT="$2" EXPECTED="$3"
            if [ "$COUNT" -gt 0 ]; then
              echo "| ${ENTITY} | ${COUNT} | ✅ |" >> $GITHUB_STEP_SUMMARY
            elif [ "$EXPECTED" == "here" ]; then
              echo "| ${ENTITY} | 0 | ⚠️ Empty — expected data here |" >> $GITHUB_STEP_SUMMARY
            elif [ "$EXPECTED" == "other-table" ]; then
              echo "| ${ENTITY} | 0 | ✅ Correct — lives in other table |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| ${ENTITY} | 0 | ℹ️ None created yet |" >> $GITHUB_STEP_SUMMARY
            fi
          }

          # ── Check bootstrap account ──
          check_bootstrap() {
            local TABLE="$1"
            local BOOTSTRAP_CHECK
            BOOTSTRAP_CHECK=$(aws dynamodb get-item \
              --table-name "$TABLE" \
              --key '{"PK":{"S":"ACCOUNT#a0000000-0000-0000-0000-000000000001"},"SK":{"S":"METADATA"}}' \
              --query 'Item.name.S' --output text 2>/dev/null || echo "")

            echo "" >> $GITHUB_STEP_SUMMARY
            if [ -n "$BOOTSTRAP_CHECK" ] && [ "$BOOTSTRAP_CHECK" != "None" ]; then
              echo "**Bootstrap Account:** ✅ \`${BOOTSTRAP_CHECK}\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Bootstrap Account:** ℹ️ Not in this table (expected)" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          }

          # ══════════════════════════════════════════════════════════════
          # CONTROL-PLANE: Admin/identity data lives here
          # Operational data (pipelines, builds, etc.) lives in data-plane
          # ══════════════════════════════════════════════════════════════
          if ! aws dynamodb describe-table --table-name "$CP_TABLE" > /dev/null 2>&1; then
            echo "### Control-Plane: ❌ Table \`${CP_TABLE}\` not found" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Control-Plane (\`${CP_TABLE}\`)" >> $GITHUB_STEP_SUMMARY
            echo "_Admin & identity data — operational data routes to data-plane_" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Entity Type | Count | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-------------|-------|--------|" >> $GITHUB_STEP_SUMMARY

            # Expected in control-plane
            for ENTITY in ACCOUNT ENTERPRISE PRODUCT SERVICE USER ROLE GROUP; do
              COUNT=$(count_pk_entity "$CP_TABLE" "$ENTITY")
              emit_row "$ENTITY" "$COUNT" "here"
            done

            # Optional in control-plane (may not exist yet)
            for ENTITY in WORKSTREAM LICENSE; do
              COUNT=$(count_pk_entity "$CP_TABLE" "$ENTITY")
              emit_row "$ENTITY" "$COUNT" "optional"
            done

            # Operational entities — should be empty in control-plane (they live in data-plane)
            for ENTITY_PREFIX in PIPELINE BUILD_JOB CONNECTOR CREDENTIAL ENVIRONMENT; do
              COUNT=$(count_sk_entity "$CP_TABLE" "$ENTITY_PREFIX")
              emit_row "${ENTITY_PREFIX} (SK)" "$COUNT" "other-table"
            done

            check_bootstrap "$CP_TABLE"
          fi

          # ══════════════════════════════════════════════════════════════
          # DATA-PLANE (PUBLIC): Operational/customer data lives here
          # Admin/identity data lives in control-plane
          # ══════════════════════════════════════════════════════════════
          # Assume cross-account role for data-plane access
          DATA_PLANE_ROLE_ARN="${{ secrets.DATA_PLANE_ROLE_ARN }}"
          CROSS_ACCOUNT_EXTERNAL_ID="${{ secrets.CROSS_ACCOUNT_EXTERNAL_ID }}"

          if [ -n "$DATA_PLANE_ROLE_ARN" ]; then
            ASSUMED=$(aws sts assume-role \
              --role-arn "$DATA_PLANE_ROLE_ARN" \
              --role-session-name "smoke-verify-dp" \
              --external-id "$CROSS_ACCOUNT_EXTERNAL_ID" \
              --duration-seconds 900 \
              --output json 2>/dev/null || echo "")

            if [ -n "$ASSUMED" ]; then
              export AWS_ACCESS_KEY_ID=$(echo "$ASSUMED" | jq -r '.Credentials.AccessKeyId')
              export AWS_SECRET_ACCESS_KEY=$(echo "$ASSUMED" | jq -r '.Credentials.SecretAccessKey')
              export AWS_SESSION_TOKEN=$(echo "$ASSUMED" | jq -r '.Credentials.SessionToken')
            fi
          fi

          if ! aws dynamodb describe-table --table-name "$DP_TABLE" > /dev/null 2>&1; then
            echo "### Data-Plane (Public): ❌ Table \`${DP_TABLE}\` not found" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Data-Plane (Public) (\`${DP_TABLE}\`)" >> $GITHUB_STEP_SUMMARY
            echo "_Operational/customer data — admin data lives in control-plane_" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Entity Type | Count | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-------------|-------|--------|" >> $GITHUB_STEP_SUMMARY

            # Admin entities — should be empty in data-plane (they live in control-plane)
            for ENTITY in ACCOUNT ENTERPRISE PRODUCT SERVICE USER ROLE GROUP WORKSTREAM LICENSE; do
              COUNT=$(count_pk_entity "$DP_TABLE" "$ENTITY")
              emit_row "$ENTITY" "$COUNT" "other-table"
            done

            # Expected in data-plane (operational data)
            for ENTITY_PREFIX in PIPELINE BUILD_JOB CONNECTOR CREDENTIAL ENVIRONMENT; do
              COUNT=$(count_sk_entity "$DP_TABLE" "$ENTITY_PREFIX")
              emit_row "${ENTITY_PREFIX} (SK)" "$COUNT" "here"
            done

            check_bootstrap "$DP_TABLE"
          fi

  # ===========================================================================
  # Step 5: Cleanup seeded data
  # ===========================================================================
  cleanup:
    name: "Cleanup Seeded Data (${{ needs.resolve.outputs.environment }})"
    runs-on: ubuntu-latest
    needs: [resolve, verify-ssm, seed-data, smoke-test, verify-email-auth, verify-dynamodb]
    if: >
      always() &&
      needs.resolve.outputs.seed_data == 'true' &&
      needs.resolve.outputs.cleanup_after == 'true' &&
      needs.seed-data.result == 'success' &&
      needs.smoke-test.result != 'cancelled'
    environment: ${{ needs.resolve.outputs.environment }}

    steps:
      - name: Configure AWS Credentials (Platform Admin via OIDC)
        id: aws_oidc
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}-${{ github.job }}
          retry-max-attempts: 12
        continue-on-error: true

      - name: Validate fallback static key availability
        if: steps.aws_oidc.outcome != 'success'
        env:
          FALLBACK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          FALLBACK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
        run: |
          if [ -z "${FALLBACK_AWS_ACCESS_KEY_ID}" ] || [ -z "${FALLBACK_AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::OIDC auth failed and fallback static keys are not configured."
            exit 1
          fi

      - name: Configure AWS Credentials (Platform Admin via static fallback)
        if: steps.aws_oidc.outcome != 'success'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Remove all smoke-test seeded data
        env:
          ENV: ${{ needs.resolve.outputs.environment }}
        run: |
          set -euo pipefail
          CLEANED=0
          ERRORS=0

          DP_TABLE="account-admin-public-${ENV}"
          CP_TABLE="${PROJECT}-${ENV}-control-plane"

          echo "## 🧹 Cleanup Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Table | Items Cleaned | Errors |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------------|--------|" >> $GITHUB_STEP_SUMMARY

          cleanup_table() {
            local TABLE="$1"
            local TABLE_CLEANED=0
            local TABLE_ERRORS=0

            if ! aws dynamodb describe-table --table-name "$TABLE" > /dev/null 2>&1; then
              echo "| \`$TABLE\` | — | Table not found |" >> $GITHUB_STEP_SUMMARY
              return
            fi

            # Delete all items with smoke_test_seed marker
            while true; do
              ITEMS=$(aws dynamodb scan \
                --table-name "$TABLE" \
                --filter-expression "attribute_exists(#st)" \
                --expression-attribute-names '{"#st":"smoke_test_seed"}' \
                --projection-expression "PK, SK" \
                --max-items 100 \
                --output json 2>/dev/null | jq -c '.Items[]' 2>/dev/null || echo "")

              if [ -z "$ITEMS" ]; then
                break
              fi

              for ITEM in $ITEMS; do
                PK=$(echo "$ITEM" | jq -r '.PK.S')
                SK=$(echo "$ITEM" | jq -r '.SK.S')
                if aws dynamodb delete-item \
                  --table-name "$TABLE" \
                  --key "{\"PK\":{\"S\":\"$PK\"},\"SK\":{\"S\":\"$SK\"}}" 2>/dev/null; then
                  TABLE_CLEANED=$((TABLE_CLEANED + 1))
                else
                  TABLE_ERRORS=$((TABLE_ERRORS + 1))
                fi
              done
            done

            # Also clean items with smoke-test in name (CRUD-created items)
            SMOKE_ITEMS=$(aws dynamodb scan \
              --table-name "$TABLE" \
              --filter-expression "contains(#n, :prefix)" \
              --expression-attribute-names '{"#n":"name"}' \
              --expression-attribute-values '{":prefix":{"S":"smoke-test"}}' \
              --projection-expression "PK, SK" \
              --output json 2>/dev/null | jq -c '.Items[]' 2>/dev/null || echo "")

            for ITEM in $SMOKE_ITEMS; do
              PK=$(echo "$ITEM" | jq -r '.PK.S')
              SK=$(echo "$ITEM" | jq -r '.SK.S')
              if aws dynamodb delete-item \
                --table-name "$TABLE" \
                --key "{\"PK\":{\"S\":\"$PK\"},\"SK\":{\"S\":\"$SK\"}}" 2>/dev/null; then
                TABLE_CLEANED=$((TABLE_CLEANED + 1))
              else
                TABLE_ERRORS=$((TABLE_ERRORS + 1))
              fi
            done

            CLEANED=$((CLEANED + TABLE_CLEANED))
            ERRORS=$((ERRORS + TABLE_ERRORS))
            echo "| \`$TABLE\` | ${TABLE_CLEANED} | ${TABLE_ERRORS} |" >> $GITHUB_STEP_SUMMARY
          }

          cleanup_table "$CP_TABLE"
          cleanup_table "$DP_TABLE"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Cleaned:** ${CLEANED} | **Total Errors:** ${ERRORS}" >> $GITHUB_STEP_SUMMARY

          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::${ERRORS} items failed to clean up"
          fi

  # ===========================================================================
  # Final Summary
  # ===========================================================================
  summary:
    name: "Regression Summary"
    runs-on: ubuntu-latest
    needs: [resolve, verify-ssm, seed-data, smoke-test, verify-email-auth, verify-dynamodb, cleanup]
    if: always() && needs.resolve.outputs.should_run == 'true'

    steps:
      - name: Final summary
        run: |
          echo "## 📋 Regression Suite Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SSM & DynamoDB Verification | ${{ needs.verify-ssm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Seed Data | ${{ needs.seed-data.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Regression Tests | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SES & Cognito Verification | ${{ needs.verify-email-auth.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DynamoDB Entry Audit | ${{ needs.verify-dynamodb.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cleanup | ${{ needs.cleanup.result }} |" >> $GITHUB_STEP_SUMMARY
