name: "04 · Deploy Backend"

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      sync_infra:
        description: 'Run Terraform apply to sync Lambda env vars (CORS, etc.)'
        required: false
        default: true
        type: boolean
      credential_notification_enabled:
        description: 'Enable SES credential emails (true/false). Leave empty to keep current.'
        required: false
        default: ''
        type: string
      ses_sender_email:
        description: 'Verified SES sender email. Leave empty to keep current.'
        required: false
        default: ''
        type: string
      platform_login_url:
        description: 'Login URL for credential emails. Leave empty to auto-detect from CloudFront.'
        required: false
        default: ''
        type: string
      platform_name:
        description: 'Platform name for email templates. Leave empty to keep current.'
        required: false
        default: ''
        type: string
      platform_support_email:
        description: 'Support email for notifications. Leave empty to keep current.'
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'license-portal' }}
  TF_VAR_environment: ${{ inputs.environment || 'dev' }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_data_plane_role_arn: ${{ secrets.DATA_PLANE_ROLE_ARN || '' }}
  TF_VAR_data_plane_dynamodb_name: ${{ secrets.DATA_PLANE_TABLE_NAME || '' }}
  TF_VAR_data_plane_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_cfn_execution_role_arn: ${{ secrets.CFN_EXECUTION_ROLE_ARN || '' }}
  TF_VAR_github_org: ${{ vars.GITHUB_ORG || github.repository_owner }}
  TF_VAR_github_repo: ${{ vars.GITHUB_REPO || github.event.repository.name }}
  TF_VAR_tf_state_bucket: ${{ secrets.TF_STATE_BUCKET || '' }}
  TF_VAR_tf_lock_table: ${{ secrets.TF_LOCK_TABLE || '' }}
  TF_VAR_credential_notification_enabled: ${{ inputs.credential_notification_enabled || vars.CREDENTIAL_NOTIFICATION_ENABLED || 'true' }}
  TF_VAR_ses_sender_email: ${{ inputs.ses_sender_email || vars.SES_SENDER_EMAIL || 'noreply@example.com' }}
  TF_VAR_platform_login_url: ${{ inputs.platform_login_url || vars.PLATFORM_LOGIN_URL || '' }}
  TF_VAR_platform_name: ${{ inputs.platform_name || vars.PLATFORM_NAME || 'License Portal' }}
  TF_VAR_platform_support_email: ${{ inputs.platform_support_email || vars.PLATFORM_SUPPORT_EMAIL || 'support@example.com' }}

jobs:
  # ===========================================================================
  # Step 0: Persist workflow inputs as repo variables (self-service config)
  # ===========================================================================
  persist-variables:
    name: Persist Notification Config
    runs-on: ubuntu-latest
    if: >-
      inputs.credential_notification_enabled != '' ||
      inputs.ses_sender_email != '' ||
      inputs.platform_login_url != '' ||
      inputs.platform_name != '' ||
      inputs.platform_support_email != ''
    steps:
      - name: Save inputs as repository variables
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          set_var() {
            local name="$1" value="$2"
            if [ -n "$value" ]; then
              echo "Setting $name=$value"
              gh variable set "$name" --repo "$REPO" --body "$value"
            fi
          }

          set_var "CREDENTIAL_NOTIFICATION_ENABLED" "${{ inputs.credential_notification_enabled }}"
          set_var "SES_SENDER_EMAIL" "${{ inputs.ses_sender_email }}"
          set_var "PLATFORM_LOGIN_URL" "${{ inputs.platform_login_url }}"
          set_var "PLATFORM_NAME" "${{ inputs.platform_name }}"
          set_var "PLATFORM_SUPPORT_EMAIL" "${{ inputs.platform_support_email }}"

          echo "### Notification Variables Updated" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ inputs.credential_notification_enabled }}" ] && echo "| CREDENTIAL_NOTIFICATION_ENABLED | \`${{ inputs.credential_notification_enabled }}\` |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ inputs.ses_sender_email }}" ] && echo "| SES_SENDER_EMAIL | \`${{ inputs.ses_sender_email }}\` |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ inputs.platform_login_url }}" ] && echo "| PLATFORM_LOGIN_URL | \`${{ inputs.platform_login_url }}\` |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ inputs.platform_name }}" ] && echo "| PLATFORM_NAME | \`${{ inputs.platform_name }}\` |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ inputs.platform_support_email }}" ] && echo "| PLATFORM_SUPPORT_EMAIL | \`${{ inputs.platform_support_email }}\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Step 1: Sync Infrastructure (Terraform apply for env vars, API Gateway, etc.)
  # ===========================================================================
  sync-infra:
    name: Sync Infrastructure (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    needs: [persist-variables]
    if: always() && (needs.persist-variables.result == 'success' || needs.persist-variables.result == 'skipped') && inputs.sync_infra != false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials (Platform Admin)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Ensure State Backend
        run: |
          bash scripts/ensure-state-backend.sh \
            "${{ secrets.TF_STATE_BUCKET }}" \
            "${{ secrets.TF_LOCK_TABLE }}" \
            "${{ vars.AWS_REGION || 'us-east-1' }}"

      - name: Create Lambda Placeholder
        working-directory: infra/control-plane/terraform
        run: |
          echo "placeholder" > lambda-placeholder.txt
          zip lambda-placeholder.zip lambda-placeholder.txt

      - name: Terraform Init
        working-directory: infra/control-plane/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=platform-admin/${{ inputs.environment || 'dev' }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'us-east-1' }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -reconfigure

      - name: Terraform Apply (sync env vars and API Gateway)
        working-directory: infra/control-plane/terraform
        run: |
          terraform apply -auto-approve
          echo "### Infrastructure Synced" >> $GITHUB_STEP_SUMMARY
          echo "Lambda environment variables and API Gateway configuration updated." >> $GITHUB_STEP_SUMMARY

      - name: Refresh AWS Credentials (after IAM policy sync)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: SES Auto Bootstrap (identity + production request)
        run: |
          set -euo pipefail

          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SES_SENDER_EMAIL="${TF_VAR_ses_sender_email}"
          PLATFORM_URL="${TF_VAR_platform_login_url}"

          if [ -z "${SES_SENDER_EMAIL}" ] || [ "${SES_SENDER_EMAIL}" = "noreply@example.com" ]; then
            echo "::error::SES_SENDER_EMAIL is missing or still default. Pass workflow input 'ses_sender_email' with a real sender address."
            exit 1
          fi

          DOMAIN="${SES_SENDER_EMAIL#*@}"
          echo "Configuring SES in account ${ACCOUNT_ID}, region ${REGION}, sender ${SES_SENDER_EMAIL}"

          if ! aws sesv2 get-account --region "${REGION}" --output json > /tmp/ses-account.json 2>/tmp/ses-account.err; then
            echo "::error::SES is unavailable in account ${ACCOUNT_ID} (${REGION}). Check PLATFORM_ADMIN_ROLE_ARN and region selection."
            cat /tmp/ses-account.err || true
            exit 1
          fi

          if ! aws sesv2 get-email-identity --region "${REGION}" --email-identity "${DOMAIN}" --output json > /tmp/ses-domain.json 2>/dev/null; then
            echo "Creating SES domain identity for ${DOMAIN}"
            aws sesv2 create-email-identity --region "${REGION}" --email-identity "${DOMAIN}" --output json > /tmp/ses-domain-create.json
            aws sesv2 get-email-identity --region "${REGION}" --email-identity "${DOMAIN}" --output json > /tmp/ses-domain.json
          fi

          HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name --dns-name "${DOMAIN}." --max-items 1 --output json 2>/dev/null \
            | jq -r --arg d "${DOMAIN}." '.HostedZones[]? | select(.Name == $d) | .Id' \
            | sed 's|/hostedzone/||' \
            | head -n1 || true)

          TOKENS=$(jq -r '.DkimAttributes.Tokens[]? // empty' /tmp/ses-domain.json)

          if [ -n "${HOSTED_ZONE_ID}" ] && [ -n "${TOKENS}" ]; then
            echo "Applying DKIM records in Route53 hosted zone ${HOSTED_ZONE_ID}"
            for token in ${TOKENS}; do
              printf '{"Comment":"SES DKIM automation from workflow 04","Changes":[{"Action":"UPSERT","ResourceRecordSet":{"Name":"%s._domainkey.%s.","Type":"CNAME","TTL":300,"ResourceRecords":[{"Value":"%s.dkim.amazonses.com"}]}}]}' \
                "${token}" "${DOMAIN}" "${token}" > /tmp/route53-ses-change.json
              aws route53 change-resource-record-sets \
                --hosted-zone-id "${HOSTED_ZONE_ID}" \
                --change-batch file:///tmp/route53-ses-change.json >/dev/null
            done
          else
            echo "::warning::Hosted zone not found (or no DKIM tokens) for ${DOMAIN}; external DNS update may be required."
          fi

          if ! aws sesv2 get-email-identity --region "${REGION}" --email-identity "${SES_SENDER_EMAIL}" --output json >/tmp/ses-sender.json 2>/dev/null; then
            echo "Creating sender identity ${SES_SENDER_EMAIL} (verification email may be sent if domain isn't verified yet)"
            aws sesv2 create-email-identity --region "${REGION}" --email-identity "${SES_SENDER_EMAIL}" --output json >/tmp/ses-sender-create.json || true
          fi

          PRODUCTION_ENABLED=$(jq -r '.ProductionAccessEnabled // false' /tmp/ses-account.json)
          if [ "${PRODUCTION_ENABLED}" != "true" ]; then
            REQUEST_URL="${PLATFORM_URL:-https://example.com}"
            echo "Requesting SES production access..."
            aws sesv2 put-account-details \
              --region "${REGION}" \
              --production-access-enabled \
              --mail-type TRANSACTIONAL \
              --website-url "${REQUEST_URL}" \
              --contact-language EN \
              --use-case-description "Transactional credential emails for automated account provisioning." \
              --additional-contact-email-addresses "${SES_SENDER_EMAIL}" >/tmp/ses-production-request.json 2>/tmp/ses-production-request.err || true
          fi

          DOMAIN_STATUS=$(aws sesv2 get-email-identity --region "${REGION}" --email-identity "${DOMAIN}" --query 'VerifiedForSendingStatus' --output text 2>/dev/null || echo "false")
          echo "### SES Auto Bootstrap" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| AWS Account | \`${ACCOUNT_ID}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AWS Region | \`${REGION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SES Sender | \`${SES_SENDER_EMAIL}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain Identity | \`${DOMAIN}\` verified=\`${DOMAIN_STATUS}\` |" >> $GITHUB_STEP_SUMMARY

          if [ "${PRODUCTION_ENABLED}" = "true" ]; then
            echo "| Production Access | already enabled |" >> $GITHUB_STEP_SUMMARY
          elif [ -s /tmp/ses-production-request.err ]; then
            echo "| Production Access | request attempted (check SES review status) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Production Access | request submitted |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "Deploy Gate: SES Domain Verification"
        if: inputs.environment == 'prod'
        run: |
          set -euo pipefail

          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          SES_SENDER_EMAIL="${TF_VAR_ses_sender_email}"
          DOMAIN="${SES_SENDER_EMAIL#*@}"

          echo "Checking SES domain verification for ${DOMAIN}..."

          VERIFIED=$(aws sesv2 get-email-identity \
            --region "${REGION}" \
            --email-identity "${DOMAIN}" \
            --query 'VerifiedForSendingStatus' \
            --output text 2>/dev/null || echo "false")

          echo "### SES Deploy Gate" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | \`${DOMAIN}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Verified | \`${VERIFIED}\` |" >> $GITHUB_STEP_SUMMARY

          if [ "${VERIFIED}" != "True" ] && [ "${VERIFIED}" != "true" ]; then
            echo "| Gate | **FAILED** — deploy blocked |" >> $GITHUB_STEP_SUMMARY
            echo "::error::SES domain '${DOMAIN}' is NOT verified. Email delivery will fail. Complete DNS verification before deploying to production."
            exit 1
          fi

          echo "| Gate | **PASSED** |" >> $GITHUB_STEP_SUMMARY
          echo "SES domain '${DOMAIN}' is verified. Proceeding with deploy."

  # ===========================================================================
  # Step 2: Build and Deploy Lambda Code
  # ===========================================================================
  deploy:
    name: Deploy Backend (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    needs: [persist-variables, sync-infra]
    if: always() && (needs.sync-infra.result == 'success' || needs.sync-infra.result == 'skipped') && (needs.persist-variables.result == 'success' || needs.persist-variables.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: backend
        run: npm install

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Package Lambda Artifact
        working-directory: backend
        run: |
          set -euo pipefail
          mkdir -p deployment
          cp -r dist deployment/
          cp package.json package-lock.json deployment/
          cd deployment
          npm ci --omit=dev
          zip -r ../lambda-package.zip .

      - name: Configure AWS Credentials (Platform Admin)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy to Lambda
        env:
          FUNCTION_NAME: ${{ vars.PROJECT_NAME || 'license-portal' }}-${{ inputs.environment || 'dev' }}-backend
        run: |
          set -euo pipefail
          
          # Update function code
          aws lambda update-function-code \
            --function-name "${FUNCTION_NAME}" \
            --zip-file fileb://backend/lambda-package.zip \
            --publish
          
          # Wait for update to complete
          aws lambda wait function-updated-v2 \
            --function-name "${FUNCTION_NAME}"
          
          # Get latest version
          LATEST_VERSION=$(aws lambda list-versions-by-function \
            --function-name "${FUNCTION_NAME}" \
            --query "Versions[-1].Version" \
            --output text)
          
          # Update live alias for zero-downtime
          aws lambda update-alias \
            --function-name "${FUNCTION_NAME}" \
            --name live \
            --function-version "${LATEST_VERSION}"
          
          echo "Deployed version ${LATEST_VERSION} to ${FUNCTION_NAME}"
          echo "### Backend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Function | \`${FUNCTION_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${LATEST_VERSION}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Verify Lambda Configuration
        env:
          FUNCTION_NAME: ${{ vars.PROJECT_NAME || 'license-portal' }}-${{ inputs.environment || 'dev' }}-backend
        run: |
          set -euo pipefail
          echo "🔍 Verifying Lambda configuration..."
          CONFIG=$(aws lambda get-function-configuration --function-name "${FUNCTION_NAME}" --query '{Handler: Handler, Runtime: Runtime, MemorySize: MemorySize, Timeout: Timeout, CodeSize: CodeSize, LastModified: LastModified}' --output json)
          echo "${CONFIG}" | jq .

          HANDLER=$(echo "${CONFIG}" | jq -r '.Handler')
          if [ "${HANDLER}" != "dist/main.handler" ]; then
            echo "::error::Handler mismatch: expected 'dist/main.handler', got '${HANDLER}'"
            exit 1
          fi
          echo "✅ Handler verified: ${HANDLER}"
