name: "04 · Deploy Backend"

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      sync_infra:
        description: 'Run Terraform apply to sync Lambda env vars (CORS, etc.)'
        required: false
        default: true
        type: boolean
      credential_notification_enabled:
        description: 'Enable SES credential emails (true/false). Leave empty to keep current.'
        required: false
        default: ''
        type: string
      ses_sender_email:
        description: 'Verified SES sender email. Leave empty to keep current.'
        required: false
        default: ''
        type: string
      platform_login_url:
        description: 'Login URL for credential emails. Leave empty to auto-detect from CloudFront.'
        required: false
        default: ''
        type: string
      platform_name:
        description: 'Platform name for email templates. Leave empty to keep current.'
        required: false
        default: ''
        type: string
      platform_support_email:
        description: 'Support email for notifications. Leave empty to keep current.'
        required: false
        default: ''
        type: string

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_project_name: ${{ vars.PROJECT_NAME || 'license-portal' }}
  TF_VAR_environment: ${{ inputs.environment || 'dev' }}
  TF_VAR_aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_data_plane_role_arn: ${{ secrets.DATA_PLANE_ROLE_ARN || '' }}
  TF_VAR_data_plane_dynamodb_name: ${{ secrets.DATA_PLANE_TABLE_NAME || '' }}
  TF_VAR_data_plane_region: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_VAR_cfn_execution_role_arn: ${{ secrets.CFN_EXECUTION_ROLE_ARN || '' }}
  TF_VAR_cross_account_external_id: ${{ secrets.CROSS_ACCOUNT_EXTERNAL_ID || '' }}
  TF_VAR_github_org: ${{ github.repository_owner }}
  TF_VAR_github_repo: ${{ github.repository }}
  TF_VAR_tf_state_bucket: ${{ secrets.TF_STATE_BUCKET || '' }}
  TF_VAR_tf_lock_table: ${{ secrets.TF_LOCK_TABLE || '' }}
  TF_VAR_credential_notification_enabled: ${{ inputs.credential_notification_enabled || vars.CREDENTIAL_NOTIFICATION_ENABLED || 'true' }}
  TF_VAR_ses_sender_email: ${{ inputs.ses_sender_email || vars.SES_SENDER_EMAIL || 'noreply@example.com' }}
  TF_VAR_platform_login_url: ${{ inputs.platform_login_url || vars.PLATFORM_LOGIN_URL || '' }}
  TF_VAR_platform_name: ${{ inputs.platform_name || vars.PLATFORM_NAME || 'License Portal' }}
  TF_VAR_platform_support_email: ${{ inputs.platform_support_email || vars.PLATFORM_SUPPORT_EMAIL || 'support@example.com' }}

jobs:
  # ===========================================================================
  # Step 0: Persist workflow inputs as repo variables (self-service config)
  # ===========================================================================
  persist-variables:
    name: Persist Notification Config
    runs-on: ubuntu-latest
    if: >-
      inputs.credential_notification_enabled != '' ||
      inputs.ses_sender_email != '' ||
      inputs.platform_login_url != '' ||
      inputs.platform_name != '' ||
      inputs.platform_support_email != ''
    steps:
      - name: Save inputs as repository variables
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          set_var() {
            local name="$1" value="$2"
            if [ -n "$value" ]; then
              echo "Setting $name=$value"
              gh variable set "$name" --repo "$REPO" --body "$value"
            fi
          }

          set_var "CREDENTIAL_NOTIFICATION_ENABLED" "${{ inputs.credential_notification_enabled }}"
          set_var "SES_SENDER_EMAIL" "${{ inputs.ses_sender_email }}"
          set_var "PLATFORM_LOGIN_URL" "${{ inputs.platform_login_url }}"
          set_var "PLATFORM_NAME" "${{ inputs.platform_name }}"
          set_var "PLATFORM_SUPPORT_EMAIL" "${{ inputs.platform_support_email }}"

          echo "### Notification Variables Updated" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ inputs.credential_notification_enabled }}" ] && echo "| CREDENTIAL_NOTIFICATION_ENABLED | \`${{ inputs.credential_notification_enabled }}\` |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ inputs.ses_sender_email }}" ] && echo "| SES_SENDER_EMAIL | \`${{ inputs.ses_sender_email }}\` |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ inputs.platform_login_url }}" ] && echo "| PLATFORM_LOGIN_URL | \`${{ inputs.platform_login_url }}\` |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ inputs.platform_name }}" ] && echo "| PLATFORM_NAME | \`${{ inputs.platform_name }}\` |" >> $GITHUB_STEP_SUMMARY
          [ -n "${{ inputs.platform_support_email }}" ] && echo "| PLATFORM_SUPPORT_EMAIL | \`${{ inputs.platform_support_email }}\` |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Step 0.5: Cross-Account Preflight — fail fast if AssumeRole is broken
  # ===========================================================================
  cross-account-preflight:
    name: Cross-Account Preflight (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    needs: [persist-variables]
    if: always() && (needs.persist-variables.result == 'success' || needs.persist-variables.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: "🔍 OIDC Preflight"
        uses: ./.github/actions/oidc-preflight
        id: oidc_preflight

      - name: Configure AWS Credentials (Platform Admin via OIDC)
        id: aws_oidc
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-session-name: gha-${{ github.run_id }}-preflight
          retry-max-attempts: 12
        continue-on-error: true

      - name: Configure AWS Credentials (Fallback static keys)
        if: steps.aws_oidc.outcome != 'success'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Validate cross-account STS AssumeRole
        env:
          DATA_PLANE_ROLE_ARN: ${{ secrets.DATA_PLANE_ROLE_ARN }}
          DATA_PLANE_TABLE_NAME: ${{ secrets.DATA_PLANE_TABLE_NAME }}
          CROSS_ACCOUNT_EXTERNAL_ID: ${{ secrets.CROSS_ACCOUNT_EXTERNAL_ID }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME || 'license-portal' }}
          ENVIRONMENT: ${{ inputs.environment || 'dev' }}
        run: |
          set -euo pipefail

          echo "::group::Platform Admin Identity"
          aws sts get-caller-identity
          echo "::endgroup::"

          # ── Check 1: Validate secrets are present ──
          MISSING=""
          if [ -z "${DATA_PLANE_ROLE_ARN}" ]; then MISSING="${MISSING} DATA_PLANE_ROLE_ARN"; fi
          if [ -z "${DATA_PLANE_TABLE_NAME}" ]; then MISSING="${MISSING} DATA_PLANE_TABLE_NAME"; fi
          if [ -z "${CROSS_ACCOUNT_EXTERNAL_ID}" ]; then MISSING="${MISSING} CROSS_ACCOUNT_EXTERNAL_ID"; fi

          if [ -n "${MISSING}" ]; then
            echo "::error::Missing required secrets:${MISSING}. Run workflow 02 (Bootstrap Customer Account) first."
            printf "### ❌ Cross-Account Preflight FAILED\n\nMissing secrets:%s\n" "${MISSING}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # ── Check 2: Attempt STS AssumeRole ──
          echo "Attempting sts:AssumeRole on ${DATA_PLANE_ROLE_ARN}..."
          ASSUME_OUTPUT=$(aws sts assume-role \
            --role-arn "${DATA_PLANE_ROLE_ARN}" \
            --role-session-name "preflight-check-${GITHUB_RUN_ID}" \
            --external-id "${CROSS_ACCOUNT_EXTERNAL_ID}" \
            --duration-seconds 900 \
            --output json 2>&1) || {
            echo "::error::sts:AssumeRole FAILED for ${DATA_PLANE_ROLE_ARN}. Check: (1) identity-based policy on backend role allows sts:AssumeRole, (2) trust policy on customer role trusts this account, (3) ExternalId matches."
            printf "### ❌ Cross-Account Preflight FAILED\n\n" >> "$GITHUB_STEP_SUMMARY"
            printf "| Check | Result |\n|-------|--------|\n" >> "$GITHUB_STEP_SUMMARY"
            printf "| DATA_PLANE_ROLE_ARN | \`%s\` |\n" "${DATA_PLANE_ROLE_ARN}" >> "$GITHUB_STEP_SUMMARY"
            printf "| AssumeRole | **FAILED** |\n" >> "$GITHUB_STEP_SUMMARY"
            printf "\n\`\`\`\n%s\n\`\`\`\n" "${ASSUME_OUTPUT}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

          ASSUMED_ARN=$(printf '%s' "${ASSUME_OUTPUT}" | jq -r '.AssumedRoleUser.Arn')
          CUSTOMER_ACCOUNT=$(printf '%s' "${ASSUME_OUTPUT}" | jq -r '.AssumedRoleUser.Arn' | cut -d: -f5)

          echo "✅ Successfully assumed role: ${ASSUMED_ARN}"

          # ── Check 3: Verify configured DynamoDB table is accessible ──
          export AWS_ACCESS_KEY_ID=$(printf '%s' "${ASSUME_OUTPUT}" | jq -r '.Credentials.AccessKeyId')
          export AWS_SECRET_ACCESS_KEY=$(printf '%s' "${ASSUME_OUTPUT}" | jq -r '.Credentials.SecretAccessKey')
          export AWS_SESSION_TOKEN=$(printf '%s' "${ASSUME_OUTPUT}" | jq -r '.Credentials.SessionToken')

          TABLE_NAME="${DATA_PLANE_TABLE_NAME}"
          echo "Verifying configured data-plane DynamoDB table ${TABLE_NAME} in customer account ${CUSTOMER_ACCOUNT}..."
          TABLE_STATUS=$(aws dynamodb describe-table --table-name "${TABLE_NAME}" --query 'Table.TableStatus' --output text 2>&1) || {
            echo "::error::Configured DATA_PLANE_TABLE_NAME='${TABLE_NAME}' is not accessible with the assumed customer role."
            printf "### ❌ Cross-Account Preflight FAILED\n\n" >> "$GITHUB_STEP_SUMMARY"
            printf "| Check | Result |\n|-------|--------|\n" >> "$GITHUB_STEP_SUMMARY"
            printf "| DATA_PLANE_ROLE_ARN | \`%s\` |\n" "${DATA_PLANE_ROLE_ARN}" >> "$GITHUB_STEP_SUMMARY"
            printf "| DATA_PLANE_TABLE_NAME | \`%s\` |\n" "${TABLE_NAME}" >> "$GITHUB_STEP_SUMMARY"
            printf "| DynamoDB Access | **FAILED** |\n" >> "$GITHUB_STEP_SUMMARY"
            printf "\n\`\`\`\n%s\n\`\`\`\n" "${TABLE_STATUS}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

          printf "### ✅ Cross-Account Preflight PASSED\n\n" >> "$GITHUB_STEP_SUMMARY"
          printf "| Check | Result |\n|-------|--------|\n" >> "$GITHUB_STEP_SUMMARY"
          printf "| DATA_PLANE_ROLE_ARN | \`%s\` |\n" "${DATA_PLANE_ROLE_ARN}" >> "$GITHUB_STEP_SUMMARY"
          printf "| DATA_PLANE_TABLE_NAME | \`%s\` |\n" "${TABLE_NAME}" >> "$GITHUB_STEP_SUMMARY"
          printf "| Customer Account | \`%s\` |\n" "${CUSTOMER_ACCOUNT}" >> "$GITHUB_STEP_SUMMARY"
          printf "| AssumeRole | ✅ Success |\n" >> "$GITHUB_STEP_SUMMARY"
          printf "| DynamoDB Table Status | \`%s\` |\n" "${TABLE_STATUS}" >> "$GITHUB_STEP_SUMMARY"

  # ===========================================================================
  # Step 1: Sync Infrastructure (Terraform apply for env vars, API Gateway, etc.)
  # ===========================================================================
  sync-infra:
    name: Sync Infrastructure (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    needs: [persist-variables, cross-account-preflight]
    # Always sync infra on push (prevents IAM/env drift). For manual runs, respect the sync_infra toggle.
    if: always() && (needs.persist-variables.result == 'success' || needs.persist-variables.result == 'skipped') && (needs.cross-account-preflight.result == 'success') && (github.event_name == 'push' || inputs.sync_infra == true)
    env:
      # Force environment-scoped secret resolution at job level to avoid accidental empty TF vars.
      TF_VAR_data_plane_role_arn: ${{ secrets.DATA_PLANE_ROLE_ARN }}
      TF_VAR_data_plane_dynamodb_name: ${{ secrets.DATA_PLANE_TABLE_NAME }}
      TF_VAR_cfn_execution_role_arn: ${{ secrets.CFN_EXECUTION_ROLE_ARN }}
      TF_VAR_cross_account_external_id: ${{ secrets.CROSS_ACCOUNT_EXTERNAL_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: "🔍 OIDC Preflight"
        uses: ./.github/actions/oidc-preflight
        id: oidc_preflight

      - name: Configure AWS Credentials (Platform Admin via OIDC)
        id: aws_oidc
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-session-name: gha-${{ github.run_id }}-${{ github.job }}
          retry-max-attempts: 12
        continue-on-error: true

      - name: "🔍 OIDC Failure Diagnostics"
        if: steps.aws_oidc.outcome != 'success'
        run: |
          echo "::warning::OIDC AssumeRoleWithWebIdentity failed. Token claims from preflight:"
          echo "  sub: ${{ steps.oidc_preflight.outputs.sub }}"
          echo "  aud: ${{ steps.oidc_preflight.outputs.aud }}"
          echo "  repo: ${{ steps.oidc_preflight.outputs.repo }}"
          echo "  role: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}"
          echo ""
          echo "Verify the IAM role trust policy Condition matches these exact values."
          echo "Common mismatches:"
          echo "  1. sub format: 'repo:owner/name:ref:...' vs trust policy 'repo:owner/name:*'"
          echo "  2. aud: must be 'sts.amazonaws.com'"
          echo "  3. OIDC provider thumbprints are stale"

      - name: Validate fallback static key availability
        if: steps.aws_oidc.outcome != 'success'
        env:
          FALLBACK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          FALLBACK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
        run: |
          if [ -z "${FALLBACK_AWS_ACCESS_KEY_ID}" ] || [ -z "${FALLBACK_AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::OIDC assume failed and fallback static AWS keys are not configured. Run workflow '00 · Init Prerequisites' once to repair trust policy."
            exit 1
          fi

      - name: Configure AWS Credentials (Fallback static keys)
        if: steps.aws_oidc.outcome != 'success'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Validate critical cross-account inputs (sync)
        run: |
          set -euo pipefail

          MISSING=""
          [ -z "${TF_VAR_data_plane_role_arn:-}" ] && MISSING="${MISSING} DATA_PLANE_ROLE_ARN"
          [ -z "${TF_VAR_data_plane_dynamodb_name:-}" ] && MISSING="${MISSING} DATA_PLANE_TABLE_NAME"
          [ -z "${TF_VAR_cross_account_external_id:-}" ] && MISSING="${MISSING} CROSS_ACCOUNT_EXTERNAL_ID"

          if [ -n "${MISSING}" ]; then
            echo "::error::Missing required environment-scoped secrets:${MISSING}. This would risk Terraform drift and broken AssumeRole at runtime."
            exit 1
          fi

          echo "Using DATA_PLANE_ROLE_ARN=${TF_VAR_data_plane_role_arn}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Ensure State Backend
        run: |
          bash scripts/ensure-state-backend.sh \
            "${{ secrets.TF_STATE_BUCKET }}" \
            "${{ secrets.TF_LOCK_TABLE }}" \
            "${{ vars.AWS_REGION || 'us-east-1' }}"

      - name: Create Lambda Placeholder
        working-directory: infra/control-plane/terraform
        run: |
          echo "placeholder" > lambda-placeholder.txt
          zip lambda-placeholder.zip lambda-placeholder.txt

      - name: Terraform Init
        working-directory: infra/control-plane/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=platform-admin/${{ inputs.environment || 'dev' }}/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION || 'us-east-1' }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -reconfigure

      - name: Terraform Apply (sync env vars and API Gateway)
        working-directory: infra/control-plane/terraform
        run: |
          terraform apply -auto-approve
          echo "### Infrastructure Synced" >> $GITHUB_STEP_SUMMARY
          echo "Lambda environment variables and API Gateway configuration updated." >> $GITHUB_STEP_SUMMARY

      - name: Refresh AWS Credentials (after IAM policy sync via OIDC)
        id: aws_refresh_oidc
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-session-name: gha-${{ github.run_id }}-${{ github.job }}
          retry-max-attempts: 12
        continue-on-error: true

      - name: Validate fallback static key availability (refresh)
        if: steps.aws_refresh_oidc.outcome != 'success'
        env:
          FALLBACK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          FALLBACK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
        run: |
          if [ -z "${FALLBACK_AWS_ACCESS_KEY_ID}" ] || [ -z "${FALLBACK_AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::OIDC refresh failed and fallback static AWS keys are not configured."
            exit 1
          fi

      - name: Refresh AWS Credentials (fallback static keys)
        if: steps.aws_refresh_oidc.outcome != 'success'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: SES Auto Bootstrap (identity + production request)
        if: env.TF_VAR_credential_notification_enabled == 'true'
        run: |
          set -euo pipefail

          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SES_SENDER_EMAIL="${TF_VAR_ses_sender_email}"
          PLATFORM_URL="${TF_VAR_platform_login_url}"

          if [ -z "${SES_SENDER_EMAIL}" ] || [ "${SES_SENDER_EMAIL}" = "noreply@example.com" ]; then
            echo "::error::SES_SENDER_EMAIL is missing or still default. Pass workflow input 'ses_sender_email' with a real sender address."
            exit 1
          fi

          DOMAIN="${SES_SENDER_EMAIL#*@}"
          echo "Configuring SES in account ${ACCOUNT_ID}, region ${REGION}, sender ${SES_SENDER_EMAIL}"

          if ! aws sesv2 get-account --region "${REGION}" --output json > /tmp/ses-account.json 2>/tmp/ses-account.err; then
            echo "::error::SES is unavailable in account ${ACCOUNT_ID} (${REGION}). Check PLATFORM_ADMIN_ROLE_ARN and region selection."
            cat /tmp/ses-account.err || true
            exit 1
          fi

          if ! aws sesv2 get-email-identity --region "${REGION}" --email-identity "${DOMAIN}" --output json > /tmp/ses-domain.json 2>/dev/null; then
            echo "Creating SES domain identity for ${DOMAIN}"
            aws sesv2 create-email-identity --region "${REGION}" --email-identity "${DOMAIN}" --output json > /tmp/ses-domain-create.json
            aws sesv2 get-email-identity --region "${REGION}" --email-identity "${DOMAIN}" --output json > /tmp/ses-domain.json
          fi

          HOSTED_ZONE_ID=$(aws route53 list-hosted-zones-by-name --dns-name "${DOMAIN}." --max-items 1 --output json 2>/dev/null \
            | jq -r --arg d "${DOMAIN}." '.HostedZones[]? | select(.Name == $d) | .Id' \
            | sed 's|/hostedzone/||' \
            | head -n1 || true)

          TOKENS=$(jq -r '.DkimAttributes.Tokens[]? // empty' /tmp/ses-domain.json)

          if [ -n "${HOSTED_ZONE_ID}" ] && [ -n "${TOKENS}" ]; then
            echo "Applying DKIM records in Route53 hosted zone ${HOSTED_ZONE_ID}"
            for token in ${TOKENS}; do
              printf '{"Comment":"SES DKIM automation from workflow 04","Changes":[{"Action":"UPSERT","ResourceRecordSet":{"Name":"%s._domainkey.%s.","Type":"CNAME","TTL":300,"ResourceRecords":[{"Value":"%s.dkim.amazonses.com"}]}}]}' \
                "${token}" "${DOMAIN}" "${token}" > /tmp/route53-ses-change.json
              aws route53 change-resource-record-sets \
                --hosted-zone-id "${HOSTED_ZONE_ID}" \
                --change-batch file:///tmp/route53-ses-change.json >/dev/null
            done
          else
            echo "::warning::Hosted zone not found (or no DKIM tokens) for ${DOMAIN}; external DNS update may be required."
          fi

          if ! aws sesv2 get-email-identity --region "${REGION}" --email-identity "${SES_SENDER_EMAIL}" --output json >/tmp/ses-sender.json 2>/dev/null; then
            echo "Creating sender identity ${SES_SENDER_EMAIL} (verification email may be sent if domain isn't verified yet)"
            aws sesv2 create-email-identity --region "${REGION}" --email-identity "${SES_SENDER_EMAIL}" --output json >/tmp/ses-sender-create.json || true
          fi

          PRODUCTION_ENABLED=$(jq -r '.ProductionAccessEnabled // false' /tmp/ses-account.json)
          if [ "${PRODUCTION_ENABLED}" != "true" ]; then
            REQUEST_URL="${PLATFORM_URL:-https://example.com}"
            echo "Requesting SES production access..."
            aws sesv2 put-account-details \
              --region "${REGION}" \
              --production-access-enabled \
              --mail-type TRANSACTIONAL \
              --website-url "${REQUEST_URL}" \
              --contact-language EN \
              --use-case-description "Transactional credential emails for automated account provisioning." \
              --additional-contact-email-addresses "${SES_SENDER_EMAIL}" >/tmp/ses-production-request.json 2>/tmp/ses-production-request.err || true
          fi

          DOMAIN_STATUS=$(aws sesv2 get-email-identity --region "${REGION}" --email-identity "${DOMAIN}" --query 'VerifiedForSendingStatus' --output text 2>/dev/null || echo "false")
          echo "### SES Auto Bootstrap" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| AWS Account | \`${ACCOUNT_ID}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| AWS Region | \`${REGION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SES Sender | \`${SES_SENDER_EMAIL}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain Identity | \`${DOMAIN}\` verified=\`${DOMAIN_STATUS}\` |" >> $GITHUB_STEP_SUMMARY

          if [ "${PRODUCTION_ENABLED}" = "true" ]; then
            echo "| Production Access | already enabled |" >> $GITHUB_STEP_SUMMARY
          elif [ -s /tmp/ses-production-request.err ]; then
            echo "| Production Access | request attempted (check SES review status) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Production Access | request submitted |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "Deploy Gate: SES Identity Verification"
        if: inputs.environment == 'prod' && env.TF_VAR_credential_notification_enabled == 'true'
        run: |
          set -euo pipefail

          REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
          SES_SENDER_EMAIL="${TF_VAR_ses_sender_email}"
          DOMAIN="${SES_SENDER_EMAIL#*@}"

          if [ -z "${SES_SENDER_EMAIL}" ] || [ "${SES_SENDER_EMAIL}" = "noreply@example.com" ]; then
            echo "::error::SES_SENDER_EMAIL is missing or default. Set a verified sender identity first."
            exit 1
          fi

          # SESv2 checks
          DOMAIN_VERIFIED=$(aws sesv2 get-email-identity \
            --region "${REGION}" \
            --email-identity "${DOMAIN}" \
            --query 'VerifiedForSendingStatus' \
            --output text 2>/dev/null || echo "false")

          EMAIL_VERIFIED=$(aws sesv2 get-email-identity \
            --region "${REGION}" \
            --email-identity "${SES_SENDER_EMAIL}" \
            --query 'VerifiedForSendingStatus' \
            --output text 2>/dev/null || echo "false")

          # SES classic fallback (covers older verified identities)
          DOMAIN_STATUS_V1=$(aws ses get-identity-verification-attributes \
            --region "${REGION}" \
            --identities "${DOMAIN}" \
            --query "VerificationAttributes.\"${DOMAIN}\".VerificationStatus" \
            --output text 2>/dev/null || echo "unknown")

          EMAIL_STATUS_V1=$(aws ses get-identity-verification-attributes \
            --region "${REGION}" \
            --identities "${SES_SENDER_EMAIL}" \
            --query "VerificationAttributes.\"${SES_SENDER_EMAIL}\".VerificationStatus" \
            --output text 2>/dev/null || echo "unknown")

          PASSED="false"
          VERIFIED_VIA="none"

          if [ "${DOMAIN_VERIFIED}" = "True" ] || [ "${DOMAIN_VERIFIED}" = "true" ] || [ "${DOMAIN_STATUS_V1}" = "Success" ]; then
            PASSED="true"; VERIFIED_VIA="domain (${DOMAIN})"
          elif [ "${EMAIL_VERIFIED}" = "True" ] || [ "${EMAIL_VERIFIED}" = "true" ] || [ "${EMAIL_STATUS_V1}" = "Success" ]; then
            PASSED="true"; VERIFIED_VIA="email (${SES_SENDER_EMAIL})"
          fi

          echo "### SES Deploy Gate" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Sender | \`${SES_SENDER_EMAIL}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain Verified (v2) | \`${DOMAIN_VERIFIED}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Email Verified (v2) | \`${EMAIL_VERIFIED}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Domain Status (v1) | \`${DOMAIN_STATUS_V1}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Email Status (v1) | \`${EMAIL_STATUS_V1}\` |" >> $GITHUB_STEP_SUMMARY

          if [ "${PASSED}" != "true" ]; then
            echo "| Gate | **FAILED** — deploy blocked |" >> $GITHUB_STEP_SUMMARY
            echo "::error::Neither domain '${DOMAIN}' nor email '${SES_SENDER_EMAIL}' is verified in SES (v2/v1 checks)."
            exit 1
          fi

          echo "| Gate | **PASSED** via ${VERIFIED_VIA} |" >> $GITHUB_STEP_SUMMARY
          echo "SES identity verified via ${VERIFIED_VIA}. Proceeding with deploy."

  # ===========================================================================
  # Step 2: Build and Deploy Lambda Code
  # ===========================================================================
  deploy:
    name: Deploy Backend (${{ inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    needs: [persist-variables, sync-infra, cross-account-preflight]
    if: always() && (needs.cross-account-preflight.result == 'success') && (needs.sync-infra.result == 'success' || needs.sync-infra.result == 'skipped') && (needs.persist-variables.result == 'success' || needs.persist-variables.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: backend
        run: npm install

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Package Lambda Artifact
        working-directory: backend
        run: |
          set -euo pipefail
          mkdir -p deployment
          cp -r dist deployment/
          cp package.json package-lock.json deployment/
          cd deployment
          npm ci --omit=dev
          zip -r ../lambda-package.zip .

      - name: "🔍 OIDC Preflight (deploy)"
        uses: ./.github/actions/oidc-preflight
        id: deploy_oidc_preflight

      - name: Configure AWS Credentials (Platform Admin via OIDC)
        id: deploy_aws_oidc
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PLATFORM_ADMIN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-session-name: gha-${{ github.run_id }}-${{ github.job }}
          retry-max-attempts: 12
        continue-on-error: true

      - name: Validate fallback static key availability (deploy)
        if: steps.deploy_aws_oidc.outcome != 'success'
        env:
          FALLBACK_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          FALLBACK_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
        run: |
          if [ -z "${FALLBACK_AWS_ACCESS_KEY_ID}" ] || [ -z "${FALLBACK_AWS_SECRET_ACCESS_KEY}" ]; then
            echo "::error::Deploy job OIDC auth failed and fallback static keys are not configured."
            exit 1
          fi

      - name: Configure AWS Credentials (Platform Admin via static fallback)
        if: steps.deploy_aws_oidc.outcome != 'success'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PLATFORM_ADMIN }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PLATFORM_ADMIN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Deploy to Lambda
        env:
          FUNCTION_NAME: ${{ vars.PROJECT_NAME || 'license-portal' }}-${{ inputs.environment || 'dev' }}-backend
        run: |
          set -euo pipefail
          
          # Update function code
          aws lambda update-function-code \
            --function-name "${FUNCTION_NAME}" \
            --zip-file fileb://backend/lambda-package.zip \
            --publish
          
          # Wait for update to complete
          aws lambda wait function-updated-v2 \
            --function-name "${FUNCTION_NAME}"
          
          # Get latest version
          LATEST_VERSION=$(aws lambda list-versions-by-function \
            --function-name "${FUNCTION_NAME}" \
            --query "Versions[-1].Version" \
            --output text)
          
          # Update live alias for zero-downtime
          aws lambda update-alias \
            --function-name "${FUNCTION_NAME}" \
            --name live \
            --function-version "${LATEST_VERSION}"
          
          echo "Deployed version ${LATEST_VERSION} to ${FUNCTION_NAME}"
          echo "### Backend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Function | \`${FUNCTION_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${LATEST_VERSION}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Verify Lambda Configuration
        env:
          FUNCTION_NAME: ${{ vars.PROJECT_NAME || 'license-portal' }}-${{ inputs.environment || 'dev' }}-backend
        run: |
          set -euo pipefail
          echo "🔍 Verifying Lambda configuration..."
          CONFIG=$(aws lambda get-function-configuration --function-name "${FUNCTION_NAME}" --query '{Handler: Handler, Runtime: Runtime, MemorySize: MemorySize, Timeout: Timeout, CodeSize: CodeSize, LastModified: LastModified}' --output json)
          echo "${CONFIG}" | jq .

          HANDLER=$(echo "${CONFIG}" | jq -r '.Handler')
          if [ "${HANDLER}" != "dist/main.handler" ]; then
            echo "::error::Handler mismatch: expected 'dist/main.handler', got '${HANDLER}'"
            exit 1
          fi
          echo "✅ Handler verified: ${HANDLER}"

      - name: Post-deploy Runtime Health Gate (AssumeRole + Routing)
        env:
          PROJECT_NAME: ${{ vars.PROJECT_NAME || 'license-portal' }}
          ENVIRONMENT: ${{ inputs.environment || 'dev' }}
          SMOKE_ACCOUNT_ID: a0000000-0000-0000-0000-000000000001
        run: |
          set -euo pipefail

          API_URL=$(aws ssm get-parameter \
            --name "/${PROJECT_NAME}/${ENVIRONMENT}/api/base-url" \
            --query 'Parameter.Value' \
            --output text 2>/dev/null || true)

          if [ -z "${API_URL}" ] || [ "${API_URL}" = "None" ]; then
            echo "::error::Missing /${PROJECT_NAME}/${ENVIRONMENT}/api/base-url in SSM; cannot run runtime health gate."
            exit 1
          fi

          API_URL="${API_URL%/}"
          echo "Runtime health gate against: ${API_URL}"

          PREFLIGHT_JSON=$(curl -sS --fail "${API_URL}/api/health/preflight-assume-role")
          PREFLIGHT_STATUS=$(echo "${PREFLIGHT_JSON}" | jq -r '.status // empty')
          if [ "${PREFLIGHT_STATUS}" != "healthy" ]; then
            echo "::error::Backend runtime AssumeRole preflight failed."
            echo "${PREFLIGHT_JSON}" | jq .
            exit 1
          fi

          FULL_JSON=$(curl -sS --fail "${API_URL}/api/health/full?accountId=${SMOKE_ACCOUNT_ID}")
          CROSS_STATUS=$(echo "${FULL_JSON}" | jq -r '.sections.cross_account.status // empty')
          ROUTING_STATUS=$(echo "${FULL_JSON}" | jq -r '.sections.routing.status // empty')

          if [ "${CROSS_STATUS}" != "healthy" ] || [ "${ROUTING_STATUS}" != "healthy" ]; then
            echo "::error::Backend runtime health failed: cross_account=${CROSS_STATUS}, routing=${ROUTING_STATUS}"
            echo "${FULL_JSON}" | jq .
            exit 1
          fi

          # Routing audit — check ALL accounts route to correct tables
          AUDIT_JSON=$(curl -sS "${API_URL}/api/health/routing-audit" 2>/dev/null || echo '{}')
          AUDIT_STATUS=$(echo "${AUDIT_JSON}" | jq -r '.status // "unknown"')
          MISROUTED=$(echo "${AUDIT_JSON}" | jq -r '.summary.misrouted // 0')
          TOTAL=$(echo "${AUDIT_JSON}" | jq -r '.summary.total_accounts // 0')

          # Export for self-healing step
          echo "AUDIT_STATUS=${AUDIT_STATUS}" >> "$GITHUB_ENV"
          echo "MISROUTED=${MISROUTED}" >> "$GITHUB_ENV"
          echo "TOTAL=${TOTAL}" >> "$GITHUB_ENV"
          echo "API_URL=${API_URL}" >> "$GITHUB_ENV"

          if [ "${AUDIT_STATUS}" = "unhealthy" ] && [ "${MISROUTED}" -gt "0" ]; then
            echo "::warning::⚠️ Routing Audit: ${MISROUTED}/${TOTAL} account(s) misrouted to control-plane! Self-healing will run next."
            echo "${AUDIT_JSON}" | jq '.accounts[] | select(.status != "ok")'
          fi

          echo "### Runtime Health Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| /api/health/preflight-assume-role | ✅ healthy |" >> "$GITHUB_STEP_SUMMARY"
          echo "| /api/health/full cross_account | ✅ ${CROSS_STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| /api/health/full routing | ✅ ${ROUTING_STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| /api/health/routing-audit | ${AUDIT_STATUS} (${MISROUTED} misrouted / ${TOTAL} total) |" >> "$GITHUB_STEP_SUMMARY"

      - name: "🔧 Self-Heal: Backfill SSM Params for Misrouted Accounts"
        if: env.MISROUTED != '0' && env.MISROUTED != ''
        env:
          CONTROL_PLANE_TABLE_NAME: ${{ vars.PROJECT_NAME || 'license-portal' }}-${{ inputs.environment || 'dev' }}
          PUBLIC_ACCOUNT_TABLE_NAME: ${{ secrets.DATA_PLANE_TABLE_NAME }}
          NODE_ENV: ${{ inputs.environment || 'dev' }}
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
        run: |
          set -euo pipefail

          echo "🔧 Self-healing: detected ${MISROUTED} misrouted account(s). Running SSM backfill with --fix..."

          cd backend
          npx ts-node scripts/backfill-ssm-params.ts --fix --json > /tmp/backfill-result.json 2>&1 || {
            echo "::error::SSM backfill script failed"
            cat /tmp/backfill-result.json || true
            exit 1
          }

          CREATED=$(jq -r '.summary.paramsCreated // 0' /tmp/backfill-result.json)
          FIXED=$(jq -r '.summary.paramsFixed // 0' /tmp/backfill-result.json)
          STILL_WRONG=$(jq -r '.summary.paramsWrongValue // 0' /tmp/backfill-result.json)
          OK=$(jq -r '.summary.paramsOk // 0' /tmp/backfill-result.json)

          echo "### 🔧 Self-Healing: SSM Backfill Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Already correct | ${OK} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Created | ${CREATED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Fixed | ${FIXED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Still wrong | ${STILL_WRONG} |" >> "$GITHUB_STEP_SUMMARY"

          if [ "${STILL_WRONG}" -gt "0" ]; then
            echo "::warning::${STILL_WRONG} SSM param(s) could not be auto-fixed. Manual intervention required."
          fi

      - name: "✅ Post-Heal Routing Re-Audit"
        if: env.MISROUTED != '0' && env.MISROUTED != ''
        run: |
          set -euo pipefail

          echo "Re-running routing audit after self-healing..."
          sleep 5

          REAUDIT_JSON=$(curl -sS "${API_URL}/api/health/routing-audit" 2>/dev/null || echo '{}')
          REAUDIT_STATUS=$(printf '%s' "${REAUDIT_JSON}" | jq -r '.status // "unknown"')
          REAUDIT_MISROUTED=$(printf '%s' "${REAUDIT_JSON}" | jq -r '.summary.misrouted // 0')
          REAUDIT_TOTAL=$(printf '%s' "${REAUDIT_JSON}" | jq -r '.summary.total_accounts // 0')

          echo "### ✅ Post-Heal Re-Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Before | After |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Misrouted | ${MISROUTED} | ${REAUDIT_MISROUTED} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total | ${TOTAL} | ${REAUDIT_TOTAL} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ${AUDIT_STATUS} | ${REAUDIT_STATUS} |" >> "$GITHUB_STEP_SUMMARY"

          if [ "${REAUDIT_MISROUTED}" -gt "0" ]; then
            echo "::error::Self-healing did not fully resolve routing issues. ${REAUDIT_MISROUTED} account(s) still misrouted."
            printf '%s' "${REAUDIT_JSON}" | jq '.accounts[] | select(.status != "ok")'
            exit 1
          fi

          echo "✅ All ${REAUDIT_TOTAL} account(s) routing correctly after self-heal."
