name: 'OIDC Preflight Diagnostics'
description: 'Decode and log GitHub OIDC token claims for trust-policy troubleshooting'

outputs:
  sub:
    description: 'OIDC token sub claim'
    value: ${{ steps.decode.outputs.sub }}
  aud:
    description: 'OIDC token aud claim'
    value: ${{ steps.decode.outputs.aud }}
  repo:
    description: 'OIDC token repository claim'
    value: ${{ steps.decode.outputs.repo }}

runs:
  using: composite
  steps:
    - name: "đź”Ť OIDC Preflight: Decode token claims"
      id: decode
      shell: bash
      continue-on-error: true
      run: |
        set -euo pipefail
        echo "Fetching GitHub OIDC token for diagnostics..."
        TOKEN=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" \
          | jq -r '.value // empty')

        if [ -z "${TOKEN}" ]; then
          echo "::warning::Could not retrieve OIDC token â€” id-token permission may be missing."
          exit 0
        fi

        # Decode JWT payload (base64url â†’ base64 â†’ json)
        PAYLOAD=$(echo "${TOKEN}" | cut -d. -f2 | tr '_-' '/+' | fold -w 4 | sed '$ s/$/===/' | tr -d '\n' | base64 -d 2>/dev/null || echo '{}')

        SUB=$(echo "${PAYLOAD}" | jq -r '.sub // "N/A"')
        AUD=$(echo "${PAYLOAD}" | jq -r '.aud // "N/A"')
        ISS=$(echo "${PAYLOAD}" | jq -r '.iss // "N/A"')
        REPO=$(echo "${PAYLOAD}" | jq -r '.repository // "N/A"')
        REF=$(echo "${PAYLOAD}" | jq -r '.ref // "N/A"')
        SHA=$(echo "${PAYLOAD}" | jq -r '.sha // "N/A"')
        WORKFLOW=$(echo "${PAYLOAD}" | jq -r '.workflow // "N/A"')
        ENV=$(echo "${PAYLOAD}" | jq -r '.environment // "N/A"')
        JOB_WORKFLOW_REF=$(echo "${PAYLOAD}" | jq -r '.job_workflow_ref // "N/A"')

        echo "### đź”Ť OIDC Token Claims (Preflight)" >> $GITHUB_STEP_SUMMARY
        echo "| Claim | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| \`sub\` | \`${SUB}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`aud\` | \`${AUD}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`iss\` | \`${ISS}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`repository\` | \`${REPO}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`ref\` | \`${REF}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`sha\` | \`${SHA}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`workflow\` | \`${WORKFLOW}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`environment\` | \`${ENV}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`job_workflow_ref\` | \`${JOB_WORKFLOW_REF}\` |" >> $GITHUB_STEP_SUMMARY

        echo "sub=${SUB}" >> $GITHUB_OUTPUT
        echo "aud=${AUD}" >> $GITHUB_OUTPUT
        echo "repo=${REPO}" >> $GITHUB_OUTPUT

        echo "Token sub claim: ${SUB}"
        echo "Token aud claim: ${AUD}"
        echo "Token repository: ${REPO}"
