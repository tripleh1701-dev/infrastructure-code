name: 'OIDC Preflight Diagnostics'
description: 'Decode and log GitHub OIDC token claims for trust-policy troubleshooting'

outputs:
  sub:
    description: 'OIDC token sub claim'
    value: ${{ steps.decode.outputs.sub }}
  aud:
    description: 'OIDC token aud claim'
    value: ${{ steps.decode.outputs.aud }}
  repo:
    description: 'OIDC token repository claim'
    value: ${{ steps.decode.outputs.repo }}

runs:
  using: composite
  steps:
    - name: "🔍 OIDC Preflight: Decode token claims"
      id: decode
      shell: bash
      continue-on-error: true
      run: |
        set -euo pipefail
        echo "Fetching GitHub OIDC token for diagnostics..."
        TOKEN=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com" \
          | jq -r '.value // empty')

        if [ -z "${TOKEN}" ]; then
          echo "::warning::Could not retrieve OIDC token — id-token permission may be missing."
          exit 0
        fi

        decode_base64url() {
          local input="$1"
          local rem=$(( ${#input} % 4 ))
          if [ "$rem" -eq 2 ]; then input="${input}=="; fi
          if [ "$rem" -eq 3 ]; then input="${input}="; fi
          if [ "$rem" -eq 1 ]; then input="${input}==="; fi
          echo "${input}" | tr '_-' '/+' | base64 -d 2>/dev/null || true
        }

        # Decode JWT payload (base64url -> JSON)
        PAYLOAD=$(decode_base64url "$(echo "${TOKEN}" | cut -d. -f2)")
        if [ -z "${PAYLOAD}" ] || ! echo "${PAYLOAD}" | jq -e . >/dev/null 2>&1; then
          PAYLOAD='{}'
        fi

        read_claim() {
          local query="$1"
          local value
          value=$(echo "${PAYLOAD}" | jq -r "${query}" 2>/dev/null || true)
          value=$(echo "${value}" | tr '\r\n' ' ' | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')
          if [ -z "${value}" ] || [ "${value}" = "null" ]; then
            echo "N/A"
          else
            echo "${value}"
          fi
        }

        SUB=$(read_claim '.sub // empty')
        AUD=$(read_claim 'if (.aud|type) == "array" then (.aud | join(",")) else (.aud // empty) end')
        ISS=$(read_claim '.iss // empty')
        REPO=$(read_claim '.repository // empty')
        REF=$(read_claim '.ref // empty')
        SHA=$(read_claim '.sha // empty')
        WORKFLOW=$(read_claim '.workflow // empty')
        ENV=$(read_claim '.environment // empty')
        JOB_WORKFLOW_REF=$(read_claim '.job_workflow_ref // empty')

        echo "### 🔍 OIDC Token Claims (Preflight)" >> $GITHUB_STEP_SUMMARY
        echo "| Claim | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| \`sub\` | \`${SUB}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`aud\` | \`${AUD}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`iss\` | \`${ISS}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`repository\` | \`${REPO}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`ref\` | \`${REF}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`sha\` | \`${SHA}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`workflow\` | \`${WORKFLOW}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`environment\` | \`${ENV}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| \`job_workflow_ref\` | \`${JOB_WORKFLOW_REF}\` |" >> $GITHUB_STEP_SUMMARY

        {
          echo "sub<<__EOF__"
          echo "${SUB}"
          echo "__EOF__"
          echo "aud<<__EOF__"
          echo "${AUD}"
          echo "__EOF__"
          echo "repo<<__EOF__"
          echo "${REPO}"
          echo "__EOF__"
        } >> "$GITHUB_OUTPUT"

        echo "Token sub claim: ${SUB}"
        echo "Token aud claim: ${AUD}"
        echo "Token repository: ${REPO}"
